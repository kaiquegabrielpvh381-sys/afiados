<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}
.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}.sticky-inner{max-width:820px;margin:0 auto;}.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}.qp:hover{border-color:var(--green-b);color:#5DCAA5;}.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}.qp.disc{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.5);color:#C4B5FD;}
.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}.q-header-left{display:flex;align-items:center;gap:8px;}.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}.q-tag-disc{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C4B5FD;background:rgba(124,58,237,0.15);padding:2px 8px;border-radius:4px;}.q-tag-sep{color:rgba(255,255,255,0.12);}.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}.q-assertions{font-size:15px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;}.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-opts{display:flex;flex-direction:column;gap:9px;}.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}.q-opt[disabled]{cursor:default;}.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}.opt-elim-btn svg{pointer-events:none;}
textarea.disc-answer{width:100%;min-height:120px;resize:vertical;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.7;padding:14px 16px;outline:none;transition:border-color .2s;}textarea.disc-answer:focus{border-color:rgba(124,58,237,0.5);}textarea.disc-answer:disabled{opacity:0.7;cursor:default;}
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}.q-feedback.show{display:block;animation:fadeUp .25s ease;}.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}.fb-disc{background:rgba(124,58,237,0.07);border-color:rgba(124,58,237,0.3);color:#E8D8FF;}.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}.fb-short{display:block;margin-bottom:14px;line-height:1.8;}
.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-aprofundar:hover,.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}.ai-box.open{display:block;animation:fadeUp .3s ease;}.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}
.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}.btn-prev[disabled]{opacity:0.3;cursor:default;}.q-counter{font-size:14px;color:var(--muted);}.q-counter strong{color:#F4EFFA;font-weight:700;}.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}
.result-screen{display:none;animation:fadeUp .35s ease;}.result-screen.show{display:block;}.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}.res-stats{display:flex;gap:12px;max-width:440px;margin:0 auto 28px;}.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}.res-stat .v{font-size:22px;font-weight:700;}.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}.btn-retry:hover{background:var(--pink-bright);}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}.report-section{margin-bottom:24px;}.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}.tema-name{font-size:13px;color:var(--light);min-width:200px;flex-shrink:0;}.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}.tema-bar-fill.purple{background:linear-gradient(90deg,#7c3aed,#C4B5FD);}.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}.tema-pct.green{color:#5DCAA5;}.tema-pct.red{color:#F09595;}.tema-pct.purple{color:#C4B5FD;}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.q-review-list{display:flex;flex-direction:column;gap:6px;}.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}.q-rev-row:hover{background:rgba(255,255,255,0.05);}.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}.dot-ok{background:#5DCAA5;}.dot-err{background:#E24B4A;}.dot-disc{background:#7c3aed;}.q-rev-row span{flex:1;font-size:13px;color:var(--light);}.q-rev-row small{font-size:12px;color:var(--muted);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){nav,.sticky-bar{padding-left:16px;padding-right:16px;}.main{padding:150px 14px 60px;}.q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}.q-feedback,.ai-box{margin-left:16px;margin-right:16px;}.q-text{font-size:15px;}.q-opt{font-size:14px;padding:12px 14px;}.insight-grid{grid-template-columns:1fr;}.tema-name{min-width:120px;font-size:12px;}}
.hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle:hover{background:rgba(250,204,21,0.15);border-color:rgba(250,204,21,0.5);}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;box-shadow:0 0 12px rgba(250,204,21,0.15);}.hl-toggle svg{flex-shrink:0;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;transition:background .15s;}.q-body mark.hl:hover{background:rgba(250,204,21,0.4);}.hl-active .q-body{cursor:crosshair;}.hl-active .q-body mark.hl{cursor:pointer;}.hl-active .q-body ::selection{background:rgba(250,204,21,0.35);}
</style>
</head>

<script>
const QS=[{n:1,disc:false,tema:"Escala de Glasgow",context:"Um idoso de 66 anos de idade, foi vítima de acidente com moto em zona rural. O Serviço de Atendimento Móvel de Urgência (SAMU) foi acionado e ao chegar ao local do acidente, o socorrista encontrou paciente com rebaixamento do nível de consciência apresentando as seguintes respostas frente aos estímulos feitos pelo socorrista:\n• abertura ocular ausente.\n• localização e retirada da mão do socorrista quando este causou estímulo doloroso.\n• emissão de sons incompreensíveis durante a estimulação dolorosa.\n• ambas as pupilas fotorreativas.",assertions:null,text:"A alternativa que apresenta a correta interpretação do número de pontos na Escala de Glasgow do paciente é:",opts:["8 pontos.","9 pontos.","6 pontos.","7 pontos."],g:0,
exp:"abertura ocular ausente = 1 ponto\nlocalização e retirada da mão do socorrista quando este causou estímulo doloroso = 5 pontos\nemissão de sons incompreensíveis durante a estimulação dolorosa = 2 pontos\nambas as pupilas fotorreativas = -0 pontos\nTotal 8 pontos.",
deep:"📊 GLASGOW — CALCULANDO O CASO\n\n🔵 ABERTURA OCULAR:\n   Ausente → 1 ponto\n\n🟡 RESPOSTA VERBAL:\n   Sons incompreensíveis → 2 pontos\n\n🔴 RESPOSTA MOTORA:\n   Localiza o estímulo doloroso → 5 pontos\n\n   TOTAL: 1 + 2 + 5 = 8 pontos → TCE GRAVE\n\n📋 TABELA COMPLETA:\n   Abertura Ocular\n   Espontânea  →  4\n   À voz  →  3\n   À pressão/dor  →  2\n   Ausente  →  1 ←\n   Resposta Verbal\n   Orientado  →  5\n   Confuso  →  4\n   Palavras inapropriadas  →  3\n   Sons incompreensíveis  →  2 ←\n   Ausente  →  1\n   Resposta Motora\n   Obedece comandos  →  6\n   Localiza estímulo  →  5 ←\n   Retirada (flexão normal)  →  4\n   Decorticação (flexão anorm)  →  3\n   Descerebração (extensão)  →  2\n   Ausente  →  1\n\n💡 Pupilas fotorreativas → não somam nem subtraem no Glasgow clássico\n⚡ Score ≤ 8 = TCE grave → avaliar necessidade de IOT"},
{n:2,disc:false,tema:"Sinais Meníngeos e Grafestesia",context:"Paciente de 32 anos de idade, procura a Unidade de Pronto Atendimento com queixa de febre, cefaleia, dor e formigamento em ambas as regiões palmares há 2 dias. O médico realiza alguns testes neurológicos, para avaliação de sinais de irritação meníngeas e radiculares conforme descritos a seguir:\n\nI. Sinal de Kernig no qual o paciente permanece em decúbito dorsal no leito e em seguida, o médico realiza a extensão da perna, estando a coxa fletida em ângulo reto sobre a bacia e a perna sobre a coxa;\nII. Grafestesia oferecendo ao paciente objetos para que ele identifique, pelo tato, a forma e consistência do mesmo;\nIII. Sinal de Brudzinski no qual o paciente permanece em decúbito dorsal no leito, e o médico ao realizar flexão do quadril identifica uma rigidez de cervical;",assertions:"I. Sinal de Kernig no qual o paciente permanece em decúbito dorsal no leito e em seguida, o médico realiza a extensão da perna, estando a coxa fletida em ângulo reto sobre a bacia e a perna sobre a coxa;\nII. Grafestesia oferecendo ao paciente objetos para que ele identifique, pelo tato, a forma e consistência do mesmo;\nIII. Sinal de Brudzinski no qual o paciente permanece em decúbito dorsal no leito, e o médico ao realizar flexão do quadril identifica uma rigidez de cervical;",text:"Diante dos exames realizados pelo profissional, assinale a alternativa correta:",opts:["A assertiva II refere-se a sinais de radiculopatia, sendo que a descrição do exame está correta.","As assertivas I e III referem-se a sinais de radiculopatia, sendo que a descrição do exame está correta na assertiva I e incorreta na III.","As assertivas I e III referem-se a sinais de irritação meníngea, sendo que a descrição do exame está correta na assertiva I e III.","As assertivas I e III referem-se a sinais de irritação meníngea, sendo que a descrição do exame está correta na assertiva I e incorreta na III."],g:3,
exp:"1. Sinal de Kernig no qual o paciente permanece em decúbito dorsal no leito, e em seguida, o médico realiza a extensão da perna, estando a coxa fletida em ângulo reto sobre a bacia e a perna sobre a coxa;\nDescrição correta do exame, sendo esse teste usado para: diversas investigações como lombociatalgia, irritação meníngea, traumas, hérnias de disco e hemorragias subaracnóideas.\n2. Grafestesia oferecendo ao paciente objetos para que ele identifique, pelo tato, a forma e consistência do mesmo.\nErro: Grafestesia refere-se à habilidade de reconhecer letras ou números escritos na palma da mão, não objetos. A descrição correta seria a oferta de letras ou números escritos pelo médico na palma da mão do paciente para que ele possa identificá-los pelo tato. Esse teste é utilizado para avaliação de sinais de radiculopatia.\n3. Sinal de Brudzinski no qual o paciente permanece em decúbito dorsal no leito, e o médico, ao realizar flexão do pescoço, identifica uma rigidez do mesmo.\nErro: O Sinal de Brudzinski envolve flexionar o pescoço do paciente de forma passiva enquanto ele está em decúbito dorsal (deitado de costas). Se houver flexão involuntária dos joelhos e quadris em resposta à flexão do pescoço, pode indicar rigidez na nuca, o que pode ser um sinal de irritação meníngea, como visto em casos de meningite.\nÉ importante sempre realizar os exames neurológicos corretamente para obter resultados precisos e contribuir para um diagnóstico adequado.",
deep:"🔬 COMPARANDO OS TESTES — CORRETOS vs INCORRETOS\n\n✅ KERNIG — descrição CORRETA:\n   Decúbito dorsal → quadril em 90° → tenta estender o joelho\n   Positivo: dor + resistência → não estende além de 135°\n   Usado em: meningite, hérnia de disco, lombociatalgia\n\n❌ GRAFESTESIA — descrição ERRADA:\n   O que fizeram: ofereceram objetos para identificar por tato\n   → Isso é ESTEREOGNOSIA (identificar objetos pelo tato)\n   O que é Grafestesia de verdade:\n   → Escrever letras/números na PALMA DA MÃO com o dedo\n   → Paciente deve identificar o que foi escrito SEM OLHAR\n   → Avalia sensibilidade cortical\n\n❌ BRUDZINSKI — descrição ERRADA:\n   O que fizeram: flexão do QUADRIL\n   → Isso seria outro teste (não Brudzinski)\n   O que é Brudzinski de verdade:\n   → Flexão PASSIVA DO PESCOÇO\n   → Positivo: joelhos e quadris flexionam involuntariamente\n\n📌 MAPA DOS TESTES SENSITIVOS:\n   Teste  →  O que avalia\n   Grafestesia  →  Letras/números na palma → cortical\n   Estereognosia  →  Identificar objetos → cortical\n   Sensibilidade tátil  →  Toque simples → espinotalâmica\n   Vibração  →  Diapasão → coluna dorsal\n   Propriocepção  →  Posição dos dedos → coluna dorsal"},
{n:3,disc:false,tema:"OVACE — Heimlich em Criança >1 ano",context:"Um residente de cirurgia, estava almoçando em frente ao hospital que trabalhava, quando escuta uma mãe gritando chamando o nome da filha e batendo nas costas da mesma e percebe que a criança de 5 anos de idade, encontra-se com engasgo total, pois tenta respirar e falar e não consegue. O residente prontamente oferece ajuda.",assertions:null,text:"Qual a alternativa que corresponde com a manobra que o residente deve aplicar nesta criança para ajuda-la desengasgar.",opts:["Manobra de Brudzinski. Posiciona-se ao lado da vítima de pé, na região do abdômen com as mãos estendidas uma sobre a outra e realize compressões.","Manobra de Ortolani. Posiciona-se ao lado da vítima com as mãos estendidas na região do abdome da vítima. Realize compressões.","Manobra de Heimlich. Posiciona-se atrás da vítima na região superior do abdômen coloque uma das mãos fechada e posicione a outra em cima e realize compressões.","Manobra de Valsalva. Posiciona-se atrás da vítima em pé ou de joelhos e realize na região do abdômen golpes nas costas e compressões."],g:2,
exp:"A manobra correta para desengasgo é a manobra de Heimlich, onde o socorrista deve encontra-se por trás da vítima, posicionar a mão fechada abaixo do apêndice xifóide, colocar a mão oposta sobre a primeira e fazer quatro compressões firmes direcionadas para cima, sendo que as compressões devem ser realizadas em trancos para dentro e para cima, até que a vítima consiga expelir., colocar a mão oposta sobre a primeira e fazer quatro compressões firmes direcionadas para cima, sendo que as compressões devem ser realizadas em trancos para dentro e para cima, até que a vítima consiga expelir. Em crianças maiores que 1 ano é indicado realizar a manobra da mesma forma que no adulto.",
deep:"🤲 MANOBRA DE HEIMLICH — PASSO A PASSO\n\n📍 POSIÇÃO:\n   Socorrista atrás da vítima\n   Braços ao redor da cintura da vítima\n\n✋ POSIÇÃO DAS MÃOS:\n   1ª mão: fechada em punho, polegar para dentro\n   Posicionar: entre o umbigo e o apêndice xifóide\n   2ª mão: espalmada sobre a primeira\n\n💪 AÇÃO:\n   Compressões rápidas e firmes\n   Direção: para DENTRO e para CIMA (movimento em J)\n   Repetir até expelir o objeto OU vítima perder consciência\n\n👶 POR FAIXA ETÁRIA:\n   < 1 ano  →  5 golpes dorsais + 5 compressões\n   (lactente)  →  torácicas com 2 dedos\n   > 1 ano ← CASO  →  Heimlich (igual ao adulto)\n   e adulto\n\n❌ POR QUE AS OUTRAS ESTÃO ERRADAS:\n   A → Brudzinski é sinal MENÍNGEO, não manobra de desobstrução\n   B → Ortolani é teste de quadril em lactentes (displasia)\n   D → Valsalva é manobra de aumento de pressão intratorácica\n\n⚠️ SE A VÍTIMA PERDER CONSCIÊNCIA:\n   Deitar no chão → 30 compressões torácicas\n   Verificar se objeto está visível → remover com pinça\n   2 ventilações → continuar RCP"},
{n:4,disc:true,tema:"SBV — PCR na UBS",context:"Um estudante de medicina está estagiando em uma Unidade Básica de Saúde, quando alguém informa que uma pessoa caiu. Ao chegar ao local, o estudante encontra um homem de 60 anos de idade, caído em decúbito dorsal, apresentando uma Parada Cardiorrespiratória (PCR). A UBS está equipada com um telefone, Pocket-Mask, e um desfibrilador externo automático (DEA), além de alguns anti-hipertensivos e analgésicos comuns de uso oral. Na unidade, o estudante tem a presença de um enfermeiro, dois técnicos de enfermagem, dois agentes comunitários de saúde e um recepcionista.",assertions:null,text:"Descreva detalhadamente como você reconheceria a PCR e a sequência de atendimento até a chegada do suporte avançado de vida; de acordo com a situação descrita.",opts:[],g:null,
exp:"- Avaliar a responsividade da vítima, chamando-a e tocando-a nos ombros\n- Solicitar o DEA (presente na unidade)\n- Verificar a respiração e checar pulso carotídeo simultaneamente (em 5 a 10 segundos)\n- Iniciar ciclos de 30 compressões e 2 ventilações com uso da pocket-mask\n- Troca de funções a cada 5 ciclos ou 2 minutos\n- Chegada do DEA : ligue o DEA, conectar as pás ao tórax desnudo da vítima\n- Seguir os passos do DEA e analisar o ritmo cardíaco:\n- Se ritmo chocável, carregar e administrar o choque.\n- Se não ritmo chocável, reiniciar RCP\n- Reiniciar RCP, iniciados pelas compressões torácicas, 30 compressões e 2 ventilações por 2 minutos",
deep:"🏥 SBV NA UBS — SEQUÊNCIA COMPLETA\n\n1️⃣ RECONHECER PCR:\n   • Tocar ombros + chamar verbalmente → sem resposta\n   • Checar pulso + respiração simultaneamente (5-10 seg)\n   • Ausência de ambos = PCR confirmada\n\n2️⃣ ATIVAR O SISTEMA:\n   • Pedir para alguém ligar para o SAMU (192)\n   • Pedir o DEA (disponível na UBS)\n   • Delegar funções à equipe presente\n\n3️⃣ INICIAR RCP:\n   • 30 compressões torácicas + 2 ventilações (pocket-mask)\n   • Profundidade ≥5 cm, frequência 100-120/min\n   • Retorno completo do tórax\n   • Revezar compressor a cada 5 ciclos (≈2 min)\n\n4️⃣ QUANDO O DEA CHEGAR:\n   • Ligar o DEA\n   • Expor o tórax + secar se necessário\n   • Conectar as pás\n   • Analisar ritmo (parar compressões só para análise)\n\n5️⃣ APÓS A ANÁLISE:\n   Chocável  →  Afastar todos → choque → RCP 2 min\n   (FV ou TVsp)  →  → reanalisar\n   Não chocável  →  Reiniciar RCP imediatamente\n   (assistolia/AESP)  →  → continuar ciclos de 2 min\n\n💡 PAPEL DE CADA UM DA EQUIPE:\n   Compressor → técnico de enfermagem (alternando)\n   DEA/ventilação → enfermeiro\n   Coordenação → estudante/médico\n   SAMU → recepcionista"},
{n:5,disc:false,tema:"Teste de Romberg",context:"Paciente de 74 anos de idade, foi atendida em domicílio devido a queixas de desconforto e desequilíbrio durante a marcha. Ela relata sentir que um dos lados do seu corpo não está funcionando corretamente ao caminhar e ao realizar atividades diárias. Durante a avaliação domiciliar, foi solicitado que o acadêmico realizasse os testes de equilíbrio, neste cenário marque a alternativa correta.",assertions:null,text:"Marque a alternativa correta.",opts:["Deve ser realizado o Teste de Romberg, observando se o paciente fica em pé com os olhos fechados e pés juntos sem desequilibrar. O examinador deve ficar próximo para evitar quedas.","Deve-se solicitar que o paciente faça o teste de coordenação dedo-nariz, para avaliar se o teste de Romberg do paciente está alterado.","Deve-se realizar o teste de Stewart Holmes, para avaliar se o paciente apresenta pequenas oscilações do corpo, com tendência a movimentar-se, estando assim positivo.","Deve-se solicitar que o paciente faça o teste de coordenação dedo-nariz, para avaliar se o mesmo apresenta disbasia."],g:0,
exp:"O teste de Romberg é uma forma de avaliar o equilibrio estático. A prova é realizada com o paciente de pé e com os pés juntos. O mesmo deve olhar para frente ter os braços junto ao corpo. O examinador então solicita que o paciente feche os olhos, ficando próximo para evitar quedas. Se houver forte tendencia a quedas consideramos o teste positivo.",
deep:"⚖️ TESTE DE ROMBERG — COMO FAZER E O QUE SIGNIFICA\n\n📍 TÉCNICA:\n   1. Paciente em pé, pés juntos\n   2. Olhar para frente, braços ao longo do corpo\n   3. Observar equilíbrio com OLHOS ABERTOS\n   4. Pedir para FECHAR OS OLHOS\n   5. Examinador fica perto → evitar quedas\n   Positivo: oscilação importante ou queda ao fechar os olhos\n\n🔍 INTERPRETANDO O RESULTADO:\n   Resultado  →  Significa\n   OK olhos abertos\n   Cai ao fechar  →  VESTIBULAR ou PROPRIOCEPÇÃO\n   → Romberg POSITIVO  →  (depende da visão para compensar)\n   Cai com olhos abertos  →  CEREBELAR\n   e fechados  →  (ataxia presente sempre)\n\n❌ POR QUE AS OUTRAS ESTÃO ERRADAS:\n   B → Dedo-nariz avalia COORDENAÇÃO (cerebelo), não equilíbrio\n   C → Stewart-Holmes (rebote) avalia disdiadococinesia cerebelar\n   D → Disbasia = dificuldade de marcha → avaliada caminhando, não em pé parado\n\n💡 NO CASO: desequilíbrio durante a marcha → Romberg para avaliar o componente estático do equilíbrio"},
{n:6,disc:false,tema:"SBV Pediátrico — PCR em Criança",context:"Durante um evento esportivo no clube local, um estudante de medicina se depara com uma situação de urgência: uma criança de aproximadamente 3 anos de idade, apresenta sinais de parada cardiorrespiratória (PCR), incluindo pulso detectado de 40 batimentos por minuto (bpm) e esforços respiratórios insuficientes, com respirações agonizantes. O estudante, lembrando de suas aulas de Suporte Básico de Vida (SBV) em pediatria, decide agir rapidamente.",assertions:null,text:"Qual das seguintes ações é a mais apropriada para o estudante como único socorrista realizar?",opts:["Observar e aguardar, pois a presença de um pulso detectado indica que o paciente não está em parada cardíaca, e a respiração agonizante é uma tentativa de recuperação.","Iniciar compressões torácicas a uma taxa de 100-120 compressões por minuto, mantendo uma relação compressão-ventilação de 30:2. Com as mãos posicionadas no centro do tórax e pocket mask invertida.","Realizar massagem cardíaca externa com uma frequência de pelo menos 100 compressões por minuto, enquanto mantém o pulso palpável. Utilizar o calcanhar da mão para as compressões.","Administrar 3 ventilações de resgate para facilitar a ventilação adequada antes de iniciar compressões torácicas. Certificar-se de que a cabeça da criança está em uma posição neutra."],g:1,
exp:"Nesse cenário de parada cardiorrespiratória (PCR) com um pulso detectado de 40 batimentos por minuto e esforços respiratórios insuficientes, é necessário iniciar imediatamente as compressões torácicas para fornecer suporte circulatório adequado. A relação compressão-ventilação para crianças é de 30 compressões seguidas por 2 ventilações. As compressões torácicas devem ser realizadas a uma taxa de 100-120 compressões por minuto, com as mãos posicionadas no centro do tórax e pocket mask invertida.",
deep:"👶 PCR PEDIÁTRICA — PONTOS-CHAVE\n\n🚨 FC < 60 bpm em criança = PCR funcionalmente\n   Mesmo com pulso presente, 40 bpm não sustenta perfusão adequada\n   Gasping ≠ respiração normal → não conta como respira\n\n💪 TÉCNICA DE COMPRESSÃO EM CRIANÇA:\n   Lactente (< 1 ano)  →  2 dedos (indicador + médio)\n   OU 2 polegares circulando o tórax\n   Criança (1–8 anos) ←  →  1 ou 2 mãos no centro do tórax\n   CASO AQUI (3 anos)  →  Profundidade: 1/3 do diâmetro AP\n   ≈ 5 cm\n   Adulto  →  2 mãos, região hipotenar\n   Profundidade: 5-6 cm\n\n📋 PARÂMETROS:\n   Frequência: 100-120/min\n   Relação: 30:2 (1 socorrista) ou 15:2 (2 socorristas pediátrico)\n   Pocket-mask: usar invertida na criança\n\n❌ POR QUE NÃO AS OUTRAS:\n   A → Gasping não é recuperação, FC 40 é PCR em criança\n   C → Calcanhar da mão → força excessiva para criança\n   D → Começar com ventilações → errado, compressões primeiro (C-A-B)"},
{n:7,disc:false,tema:"SBV — DEA em Adulto",context:"Dois estudantes de medicina, voltando de um congresso, estão em um aeroporto regional aguardando voo e presenciam um homem adulto cair no chão repentinamente. Aproximam-se e, estando em um local seguro, um dos estudantes avalia que o indivíduo está sem pulso carotídeo. Ele pede que seu colega busque o Desfibrilador Automático Externo (DEA) e a pocket-mask enquanto inicia as compressões torácicas. O DEA e a máscara chegam em poucos minutos.",assertions:null,text:"Considerando a situação acima, assinale a afirmativa correta.",opts:["Utiliza-se a pocket-mask realizando 15 compressões e duas ventilações por dois minutos, antes da instalação do DEA.","Após um dos estudantes terminar 30 compressões o outro deve instalar o DEA.","Após terminar um ciclo de dois minutos de compressões, um dos estudantes deve instalar o DEA.","Imediatamente o DEA deve ser instalado para análise do ritmo e eventual necessidade de choque."],g:3,
exp:"O DEA deve ser instalado assim que esteja disponível para análise do ritmo e eventual necessidade de choque, para os ritmos fibrilação ventricular e taquicardia ventricular.",
deep:"⚡ DEA — QUANDO E COMO INSTALAR\n\n✅ REGRA PRINCIPAL:\n   DEA disponível = instalar IMEDIATAMENTE\n   Não esperar ciclos, não esperar minutos\n\n📋 SEQUÊNCIA COM 2 SOCORRISTAS:\n   Socorrista 1 → compressões torácicas\n   Socorrista 2 → busca e prepara o DEA\n   Assim que DEA estiver pronto:\n   → Pausar compressões apenas para análise (< 10 seg)\n   → Choque se indicado → retomar compressões logo\n\n🔴 RITMOS QUE O DEA CHOCA:\n   • Fibrilação Ventricular (FV) ← mais comum\n   • Taquicardia Ventricular sem pulso (TVsp)\n\n🔵 RITMOS QUE O DEA NÃO CHOCA:\n   • Assistolia (\"linha reta\")\n   • AESP (Atividade Elétrica Sem Pulso)\n   → Para esses → RCP contínua + tratar causas reversíveis\n\n❌ POR QUE AS OUTRAS ESTÃO ERRADAS:\n   A → 15:2 é para pediatria com 2 socorristas; e não esperar para instalar o DEA\n   B → Não conta compressões para instalar; instala imediatamente\n   C → Não espera ciclos; instala assim que tiver disponível"},
{n:8,disc:true,tema:"Nervo Trigêmeo — NC V",context:"No ambulatório de neurologia, paciente de 45 anos de idade, se queixa de dores intensas e recorrentes no lado direito do rosto, acompanhadas de sensação de formigamento e dormência na mesma região. O paciente relata que as dores são desencadeadas por atividades diárias simples, como comer ou escovar os dentes, e tem atrapalhado significativamente sua qualidade de vida.",assertions:null,text:"a) Com base no cenário apresentado, nomeie o nervo craniano e suas divisões.\nb) Descreva como deve ser realizado o exame físico do nervo craniano descrito acima considerando as seguintes avaliações: teste de sensibilidade, reflexo corneopalpebral, teste de força muscular da mastigação, reflexo nasofacial e reflexo mentoniano.",opts:[],g:null,
exp:"a) Nervo trigêmeo possui três divisões: oftálmica (V1), maxilar (V2) e mandibular (V3)\nb) Teste de Sensibilidade: Avaliar sensações normais de toque e dor em todas as regiões testadas. Deve ser testado com algodão em todas as 3 divisões do nervo trigêmeo.\nReflexo Corneopalpebral: tocar leve e cuidadosamente a córnea (o toque na esclera pode ser falso negativo) com uma pequena mecha de algodão umedecido ou uma simples gota de soro fisiológico, e espera-se que, em resposta, o paciente pisque direta e consensualmente. Peça ao paciente que olhe na direção oposta ao olho que irá testar e aborde o olho pela lateral. Estes cuidados procuram evitar que o paciente pisque pela visão do objeto que se aproxima antes do toque.\nTeste de Força Muscular da Mastigação: solicitar ao paciente que contraia com força a mandíbula de encontro à maxila. Enquanto palpamos o masséter e o temporal superficial, abra a boca contra resistência. Também podemos verificar a impressão dentária dos molares ao interpormos um abaixador de língua entre os maxilares e solicitarmos que o paciente feche a boca com força. Note-se que, na paralisia unilateral do trigêmeo, o desvio homolateral da mandíbula é perceptível quando se solicita ao paciente que abra a boca.\nReflexos nasofacial e mentoniano: reflexo nasofacial se introduz um pedaço de algodão no orificio da narina e como resposta reflexa acontece um espirro ou expressões contrateis faciais. O reflexo mentoniano há uma percussão com martelo na região mentoniana com a boca entre aberta e como resposta reflexa há contração do masseter no sentido de fechar a boca.",
deep:"🧠 NERVO TRIGÊMEO (NC V) — MAPA COMPLETO\n\n📊 3 DIVISÕES:\n   V1  |  Oftálmica  |  Sensibilidade: fronte, córnea,\n   nariz superior\n   V2  |  Maxilar  |  Sensibilidade: bochechas, nariz\n   inferior, lábio superior\n   V3  |  Mandibular  |  Sensibilidade: mento, lábio inferior\n   + MOTOR: músculos da mastigação\n\n🔬 EXAMES DO NC V:\n\n1️⃣ Teste de Sensibilidade\n   Algodão nas 3 regiões (V1, V2, V3)\n   Comparar bilateralmente\n\n2️⃣ Reflexo Corneopalpebral (V1 aferente + VII eferente)\n   Tocar a CÓRNEA (não esclera)\n   Algodão úmido ou gota de soro\n   Paciente olha para lado oposto\n   Resposta: piscamento ipsi e contralateral\n\n3️⃣ Força da Mastigação (V3 motor)\n   Palpar masséter + temporal → pedir para morder\n   Abrir boca contra resistência\n   Na paralisia unilateral: mandíbula desvia para o lado lesado\n\n4️⃣ Reflexo Nasofacial\n   Algodão na narina → espirro ou contração facial\n\n5️⃣ Reflexo Mentoniano\n   Percussão no mento com boca entreaberta\n   Resposta: contração do masséter (fecha a boca)\n\n💡 NEURALGIA DO TRIGÊMEO:\n   Dor excruciante, tipo choque, no trajeto do V\n   Desencadeada por toque, mastigação, falar\n   Tratamento: carbamazepina ou cirurgia"},
{n:9,disc:false,tema:"Campimetria — Lesão do Quiasma",context:"Um paciente de 33 anos de idade, com diagnóstico de tumor de hipófise, com extensão supra selar, apresenta uma queixa visual típica relacionada a lesão do quiasma ótico (lesão de número 2 na imagem), com prejuízo do campo visual, devido a comprometimento da inervação da retina nasal bilateral.",assertions:null,text:"Assinale a alternativa que melhor representa a campimetria do paciente:",opts:["O paciente apresenta comprometimento na campimetria de confrontação por não perceber estímulos visuais com o olho direito.","O paciente apresenta comprometimento na campimetria de confrontação por não perceber estímulos visuais nos campos visuais temporais bilateralmente.","O paciente apresenta comprometimento na campimetria de confrontação por não perceber estímulos visuais nos campos visuais nasais bilateralmente.","O paciente apresenta comprometimento na campimetria de confrontação por não perceber estímulos visuais com o olho esquerdo."],g:1,
exp:"Lesões do quiasma ótico interrompem a condução nervosa do segundo par craniano afetando a região nasal da retina bilateralmente, comprometendo assim os campos visuais temporais bilateralmente. As anotações das alterações são realizadas em relação ao campo visual acometido e não em relação a região da retina afetada.",
deep:"👁️ VIA ÓPTICA — MAPA DAS LESÕES\n\nComo as fibras cruzam no quiasma:\n• Retina NASAL → fibras cruzam para o lado oposto\n• Retina TEMPORAL → fibras seguem ipsilaterais\n\n🗺️ LESÕES E SEUS EFEITOS:\n\n   Local da lesão  →  Defecto de campo visual\n   NC II direito  →  Amaurose total olho direito\n   (antes do quiasma)\n   QUIASMA ← CASO AQUI  →  Hemianopsia BITEMPORAL\n   (tumor hipofisário)  →  Perde visão lateral (temporal) dos 2\n   olhos → não vê nas laterais\n   Trato óptico direito  →  Hemianopsia homônima esquerda\n   (após quiasma)  →  Perde campo visual esquerdo nos 2 olhos\n   Radiações ópticas  →  Quadrantanopsia homônima\n   (lobo parietal/  →  (perde 1/4 do campo visual)\n   temporal/occipital)\n\n💡 MACETE:\n   Retina NASAL → vê campo TEMPORAL\n   Lesão do quiasma → fibras nasais afetadas → perde TEMPORAL bilateral\n   → Hemianopsia BITEMPORAL (\"visão de túnel invertida\")"},
{n:10,disc:false,tema:"Testes Ortopédicos — Quadril, Joelho e Tornozelo",context:"Paciente do sexo masculino, 42 anos, sofreu um grave acidente de moto, que resultou em uma luxação de quadril, rompimento do ligamento do joelho e uma luxação de tornozelo. O paciente foi encaminhado ao hospital e passou por procedimento cirúrgico para redução da luxação de quadril e cirurgia para reconstrução ligamentar do joelho. Após 2 meses dos procedimentos cirúrgicos, paciente procura médico de saúde da família na UBS, com queixa de dor de forte intensidade em joelho direito e incapacitante, acompanhada de dificuldade do movimento da perna direita e instabilidade quando apoia a perna no chão. Diante desse histórico o médico decide realizar o exame físico e testes para o quadril, joelho e tornozelo.",assertions:null,text:"Observe as imagens e identifique o tipo de teste representado por elas respectivamente na ordem como estão apresentadas.",opts:["Teste de Apley, teste de McMurray, teste de Tinel","Teste de gaveta anterior, teste de Thomas, teste de Patrick","Teste de Patrick, teste de McMurray, teste de gaveta anterior","Teste de Trendelenburg, teste de Apley, teste de Gaenslen"],g:2,
exp:"O exame físico direcionado às queixas ortopédicas segue princípios da semiologia geral tais como: inspeção (estática e dinâmica), palpação, amplitude de movimento, avaliação da forca muscular, avaliação neurológica e os \"testes específicos\". A questão envolve imagens descritivas de três testes, respectivamente do quadril, joelho e tornozelo, onde o aluno deve saber identicar cada um dos testes através da imagem.\nTeste de Patrick é um teste especial realizado em um exame físico para avaliar as articulação sacroilíaca e do quadril de pacientes que possuem dor lombar.\nNo teste, é realizado a manobra de Flexão, Abdução e Rotação Externa (FABERE) do membro inferior. O teste permite ao avaliador realizar um estresse articular na região sacroilíaca, visando reproduzir a dor referida pelo paciente.\nTeste de MCMurray: Para testar o menisco medial, o examinador palpa a face póstero-medial do joelho enquanto estende o joelho e giram externamente a tíbia. Um estresse em valgo também é aplicado. Para testar o menisco lateral, o examinador palpa a linha articular póstero-lateral, estendendo o joelho e girando internamente a tíbia. Um estresse em varo também é aplicado.\nTeste de gaveta anterior: realizado para testar a integralidade do ligamento talofibular anterior e a porção ântero-lateral da cápsula articular, o médico segura firmemente com uma mão a tíbia e com a outra mão exerce uma tração anterior no nível de calcâneo e observa o grau de deslocamento.",
deep:"🦴 TESTES ORTOPÉDICOS ESPECIAIS — GUIA\n\n1️⃣ TESTE DE PATRICK (FABERE) — QUADRIL\n   Mnemônico: Flexão + Abdução + Rotação Externa\n   Técnica: deitado, pé do lado testado sobre o joelho oposto\n   (posição de \"4\")\n   Examina pressiona joelho para baixo\n   Positivo: dor na articulação sacroilíaca ou quadril\n   Avalia: articulação sacroilíaca e coxofemoral\n\n2️⃣ TESTE DE McMURRAY — JOELHO (meniscos)\n   Menisco MEDIAL:\n   → Palpa linha póstero-medial\n   → Estende o joelho + rota externamente a tíbia + valgo\n   → Positivo: clique/dor na linha medial\n   Menisco LATERAL:\n   → Palpa linha póstero-lateral\n   → Estende o joelho + rota internamente a tíbia + varo\n   → Positivo: clique/dor na linha lateral\n\n3️⃣ TESTE DE GAVETA ANTERIOR — TORNOZELO\n   Avalia: ligamento talofibular anterior (LTFA)\n   Técnica: segura firmemente a tíbia com uma mão\n   Outra mão puxa o calcâneo para frente\n   Positivo: deslocamento anterior do pé > 5mm\n   Indica: ruptura do LTFA\n\n📋 OUTROS TESTES IMPORTANTES PARA O JOELHO:\n• Lachman (15°) → LCA\n• Gaveta anterior do joelho → LCA\n• Varo/Valgo → ligamentos colaterais\n• Apley → meniscos (compressão em decúbito ventral)"}];

const L = ['a','b','c','d'];
let cur = 0, sel = null, answered = {}, eliminated = {};

function buildPills(){const w=document.getElementById('qPills');w.innerHTML='';for(let i=0;i<QS.length;i++){const b=document.createElement('button');b.className='qp';b.id='qp'+i;b.textContent=i+1;b.onclick=(function(idx){return function(){goTo(idx);};})(i);w.appendChild(b);}}
function syncPills(){for(let i=0;i<QS.length;i++){const p=document.getElementById('qp'+i);if(!p)continue;p.className='qp';if(i===cur)p.classList.add('current');if(answered[i]!==undefined){if(QS[i].disc)p.classList.add('disc');else p.classList.add(answered[i]===QS[i].g?'correct':'wrong');}}}
function renderQ(){const q=QS[cur];sel=(answered[cur]!==undefined)?answered[cur]:null;const done=answered[cur]!==undefined;document.getElementById('qTagNum').textContent='Quest\u00e3o '+q.n;document.getElementById('qTagTema').textContent=q.tema;document.getElementById('qCounterNum').textContent=q.n;const discSep=document.getElementById('qTagDiscSep');const discTag=document.getElementById('qTagDisc');if(q.disc){discSep.style.display='';discTag.style.display='';}else{discSep.style.display='none';discTag.style.display='none';}const ctx=document.getElementById('qContext');if(q.context){ctx.style.display='block';ctx.textContent=q.context;}else{ctx.style.display='none';}const asr=document.getElementById('qAssertions');if(q.assertions){asr.style.display='block';asr.innerHTML=q.assertions.replace(/\n/g,'<br>');}else{asr.style.display='none';}document.getElementById('qText').innerHTML=q.text.replace(/\n/g,'<br>');const wrap=document.getElementById('qOpts');wrap.innerHTML='';if(q.disc){const ta=document.createElement('textarea');ta.className='disc-answer';ta.placeholder='Escreva sua resposta aqui...';if(done){ta.disabled=true;ta.value=answered[cur]||'';}wrap.appendChild(ta);}else{q.opts.forEach(function(o,i){const btn=document.createElement('button');btn.className='q-opt';if(done){btn.setAttribute('disabled','');if(i===q.g)btn.classList.add('correct');else if(i===sel&&i!==q.g)btn.classList.add('wrong');}else if(sel===i){btn.classList.add('selected');}const isElim=!done&&eliminated[cur]&&eliminated[cur].has(i);if(isElim)btn.classList.add('eliminated');btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span class="opt-text">'+o+'</span><button class="opt-elim-btn" title="Eliminar alternativa"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';if(!done){(function(idx){btn.onclick=function(e){if(e.target.closest('.opt-elim-btn'))return;selectOpt(idx);};btn.querySelector('.opt-elim-btn').onclick=function(e){e.stopPropagation();if(!eliminated[cur])eliminated[cur]=new Set();if(eliminated[cur].has(idx)){eliminated[cur].delete(idx);btn.classList.remove('eliminated');}else{eliminated[cur].add(idx);btn.classList.add('eliminated');if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}}};})(i);}else{btn.querySelector('.opt-elim-btn').style.display='none';}wrap.appendChild(btn);});}const fb=document.getElementById('qFeedback');const aiBox=document.getElementById('aiBox');if(done){const isDisc=q.disc;const ok=!isDisc&&sel===q.g;const fbClass=isDisc?'fb-disc':(ok?'fb-ok':'fb-err');const fbLabel=isDisc?'\u270d Gabarito comentado':(ok?'\u2713 Correto!':'\u2717 Incorreto \u2014 Gabarito: '+L[q.g].toUpperCase());fb.className='q-feedback show '+fbClass;fb.innerHTML='<span class="fb-label">'+fbLabel+'</span><span class="fb-short">'+q.exp+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">\u2726 Aprofundar com IA</button>';aiBox.classList.remove('open');document.getElementById('aiContent').textContent='';}else{fb.className='q-feedback';fb.innerHTML='';aiBox.style.display='none';aiBox.classList.remove('open');}document.getElementById('btnPrev').disabled=(cur===0);const btnN=document.getElementById('btnNext');if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}else{btnN.innerHTML='Pr\u00f3xima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}const btnR=document.getElementById('btnRespond');if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(!q.disc&&sel===null);}syncPills();}
function toggleAI(qIdx){const aiBox=document.getElementById('aiBox');const btnAI=document.getElementById('btnAI');if(aiBox.classList.contains('open')){aiBox.classList.remove('open');if(btnAI)btnAI.classList.remove('active');}else{document.getElementById('aiContent').textContent=QS[qIdx].deep;aiBox.style.display='block';aiBox.classList.add('open');if(btnAI)btnAI.classList.add('active');}}
function selectOpt(i){if(answered[cur]!==undefined)return;sel=i;document.getElementById('btnRespond').disabled=false;document.querySelectorAll('.q-opt').forEach(function(o,idx){if(!o.classList.contains('eliminated')){o.className='q-opt'+(idx===i?' selected':'');}(function(ii){o.onclick=function(e){if(!e.target.closest('.opt-elim-btn'))selectOpt(ii);};})(idx);});}
function submitAnswer(){if(answered[cur]!==undefined)return;const q=QS[cur];if(q.disc){const ta=document.querySelector('.disc-answer');answered[cur]=ta?ta.value:'';}else{if(sel===null)return;answered[cur]=sel;}renderQ();if(Object.keys(answered).length===QS.length){setTimeout(showResult,350);}}
function prevQ(){if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
function nextQ(){if(cur===QS.length-1){showResult();return;}cur++;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function goTo(i){cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function showResult(){document.getElementById('qCard').style.display='none';const rs=document.getElementById('resultScreen');rs.classList.add('show');const mcQs=QS.filter(function(q){return!q.disc;});const discQs=QS.filter(function(q){return q.disc;});const answeredMC=mcQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;});const correct=answeredMC.filter(function(q){return answered[QS.indexOf(q)]===q.g;}).length;const total=answeredMC.length;const pct=total>0?Math.round((correct/mcQs.length)*100):0;const ring=document.getElementById('resRing');ring.textContent=pct+'%';ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');document.getElementById('resTitle').textContent=pct>=70?'Parab\u00e9ns!':pct>=50?'Quase l\u00e1!':'Continue praticando!';document.getElementById('resSub').textContent='Voc\u00ea acertou '+correct+' de '+total+' quest\u00f5es de m\u00faltipla escolha ('+pct+'%)';document.getElementById('resOk').textContent=correct;document.getElementById('resErr').textContent=total-correct;document.getElementById('resDisc').textContent=discQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;}).length;document.getElementById('resSkip').textContent=QS.length-Object.keys(answered).length;buildReport(correct,total);rs.scrollIntoView({behavior:'smooth',block:'start'});}
function buildReport(correct,total){const temaStats={};QS.forEach(function(q,i){if(!temaStats[q.tema])temaStats[q.tema]={total:0,correct:0,wrong:0,disc:0};const t=temaStats[q.tema];t.total++;if(q.disc){t.disc++;}else if(answered[i]===undefined){}else if(answered[i]===q.g){t.correct++;}else{t.wrong++;}});const sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});let barsHtml='';sorted.forEach(function(tema){const s=temaStats[tema];const mc=s.total-s.disc;if(mc===0){barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill purple" style="width:100%"></div></div><span class="tema-pct purple">Disc.</span></div>';return;}const pct=Math.round((s.correct/mc)*100);const isGood=pct>=50;barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill '+(isGood?'green':'red')+'" style="width:'+pct+'%"></div></div><span class="tema-pct '+(isGood?'green':'red')+'">'+pct+'%</span></div>';});const worstTema=sorted.find(function(t){return temaStats[t].wrong>0;})||'\u2014';const bestTema=sorted.slice().reverse().find(function(t){const s=temaStats[t];return(s.total-s.disc)>0&&s.correct>0;})||'\u2014';const pct=total>0?Math.round((correct/total)*100):0;const streakMsg=pct>=70?'\u00d3timo dom\u00ednio geral!':pct>=50?'Foque nos pontos fracos.':'Revise os conte\u00fados antes da prova.';let wrongHtml='';QS.forEach(function(q,i){if(!q.disc&&answered[i]!==undefined&&answered[i]!==q.g){wrongHtml+='<div class="q-rev-row" onclick="goToQ('+i+')"><div class="rev-dot dot-err"></div><span>Q'+q.n+' \u2014 '+q.tema+'</span><small>Resp: '+L[answered[i]].toUpperCase()+' \u00b7 Gabarito: '+L[q.g].toUpperCase()+'</small></div>';}});if(!wrongHtml)wrongHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro registrado \ud83c\udf89</div>';document.getElementById('reportContent').innerHTML='<div class="report-section"><h4>Desempenho por tema</h4><div>'+barsHtml+'</div></div><div class="report-section"><h4>Insights</h4><div class="insight-grid"><div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Maior incid\u00eancia de erros</div></div><div class="insight-box"><div class="ib-label">Melhor desempenho</div><div class="ib-val">'+bestTema+'</div><div class="ib-sub">Maior taxa de acerto</div></div><div class="insight-box"><div class="ib-label">Aproveitamento</div><div class="ib-val">'+correct+'/'+total+'</div><div class="ib-sub">'+streakMsg+'</div></div><div class="insight-box"><div class="ib-label">Quest\u00f5es puladas</div><div class="ib-val">'+(QS.length-Object.keys(answered).length)+'</div><div class="ib-sub">Sem resposta registrada</div></div></div></div><div class="report-section"><h4>Quest\u00f5es erradas</h4><div class="q-review-list">'+wrongHtml+'</div></div>';}
function goToQ(i){document.getElementById('qCard').style.display='block';document.getElementById('resultScreen').classList.remove('show');cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function resetAll(){answered={};sel=null;cur=0;eliminated={};document.getElementById('resultScreen').classList.remove('show');document.getElementById('qCard').style.display='block';renderQ();window.scrollTo({top:0,behavior:'smooth'});}
buildPills();renderQ();
var hlOn=false; function toggleHL(){hlOn=!hlOn;document.querySelectorAll('.hl-toggle').forEach(function(b){b.classList.toggle('active',hlOn);});document.body.classList.toggle('hl-active',hlOn);} document.addEventListener('mouseup',hlHandle);document.addEventListener('touchend',hlHandle); function hlHandle(e){if(!hlOn)return;var s=window.getSelection();if(!s||s.isCollapsed||!s.rangeCount)return;var r=s.getRangeAt(0);var p=r.commonAncestorContainer;if(p.nodeType===3)p=p.parentNode;var qb=p.closest?p.closest('.q-body'):null;if(!qb){var sc=r.startContainer;if(sc.nodeType===3)sc=sc.parentNode;qb=sc.closest?sc.closest('.q-body'):null;}if(!qb)return;if(e.target&&e.target.closest&&e.target.closest('mark.hl'))return;var t=s.toString().trim();if(!t||t.length<2)return;try{var m=document.createElement('mark');m.className='hl';m.title='Clique para remover';r.surroundContents(m);}catch(ex){try{var f=r.extractContents();var m2=document.createElement('mark');m2.className='hl';m2.title='Clique para remover';m2.appendChild(f);r.insertNode(m2);}catch(ex2){}}s.removeAllRanges();} document.addEventListener('click',function(e){if(!hlOn)return;var m=e.target.closest?e.target.closest('mark.hl'):null;if(!m)return;var p=m.parentNode;while(m.firstChild)p.insertBefore(m.firstChild,m);p.removeChild(m);p.normalize();});
