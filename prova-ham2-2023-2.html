<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}
.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}.sticky-inner{max-width:820px;margin:0 auto;}.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}.qp:hover{border-color:var(--green-b);color:#5DCAA5;}.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}.qp.disc{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.5);color:#C4B5FD;}
.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}.q-header-left{display:flex;align-items:center;gap:8px;}.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}.q-tag-disc{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C4B5FD;background:rgba(124,58,237,0.15);padding:2px 8px;border-radius:4px;}.q-tag-sep{color:rgba(255,255,255,0.12);}.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}.q-assertions{font-size:15px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;}.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-opts{display:flex;flex-direction:column;gap:9px;}.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}.q-opt[disabled]{cursor:default;}.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}.opt-elim-btn svg{pointer-events:none;}
textarea.disc-answer{width:100%;min-height:120px;resize:vertical;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.7;padding:14px 16px;outline:none;transition:border-color .2s;}textarea.disc-answer:focus{border-color:rgba(124,58,237,0.5);}textarea.disc-answer:disabled{opacity:0.7;cursor:default;}
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}.q-feedback.show{display:block;animation:fadeUp .25s ease;}.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}.fb-disc{background:rgba(124,58,237,0.07);border-color:rgba(124,58,237,0.3);color:#E8D8FF;}.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}.fb-short{display:block;margin-bottom:14px;line-height:1.8;}
.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-aprofundar:hover,.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}.ai-box.open{display:block;animation:fadeUp .3s ease;}.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}
.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}.btn-prev[disabled]{opacity:0.3;cursor:default;}.q-counter{font-size:14px;color:var(--muted);}.q-counter strong{color:#F4EFFA;font-weight:700;}.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}
.result-screen{display:none;animation:fadeUp .35s ease;}.result-screen.show{display:block;}.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}.res-stats{display:flex;gap:12px;max-width:440px;margin:0 auto 28px;}.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}.res-stat .v{font-size:22px;font-weight:700;}.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}.btn-retry:hover{background:var(--pink-bright);}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}.report-section{margin-bottom:24px;}.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}.tema-name{font-size:13px;color:var(--light);min-width:200px;flex-shrink:0;}.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}.tema-bar-fill.purple{background:linear-gradient(90deg,#7c3aed,#C4B5FD);}.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}.tema-pct.green{color:#5DCAA5;}.tema-pct.red{color:#F09595;}.tema-pct.purple{color:#C4B5FD;}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.q-review-list{display:flex;flex-direction:column;gap:6px;}.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}.q-rev-row:hover{background:rgba(255,255,255,0.05);}.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}.dot-ok{background:#5DCAA5;}.dot-err{background:#E24B4A;}.dot-disc{background:#7c3aed;}.q-rev-row span{flex:1;font-size:13px;color:var(--light);}.q-rev-row small{font-size:12px;color:var(--muted);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){nav,.sticky-bar{padding-left:16px;padding-right:16px;}.main{padding:150px 14px 60px;}.q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}.q-feedback,.ai-box{margin-left:16px;margin-right:16px;}.q-text{font-size:15px;}.q-opt{font-size:14px;padding:12px 14px;}.insight-grid{grid-template-columns:1fr;}.tema-name{min-width:120px;font-size:12px;}}
.hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle:hover{background:rgba(250,204,21,0.15);border-color:rgba(250,204,21,0.5);}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;box-shadow:0 0 12px rgba(250,204,21,0.15);}.hl-toggle svg{flex-shrink:0;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;transition:background .15s;}.q-body mark.hl:hover{background:rgba(250,204,21,0.4);}.hl-active .q-body{cursor:crosshair;}.hl-active .q-body mark.hl{cursor:pointer;}.hl-active .q-body ::selection{background:rgba(250,204,21,0.35);}
</style>
</head>

<script>
const QS=[{n:1,disc:false,tema:"Escala de Glasgow",src:"Afya 2023.2",context:"Um idoso de 66 anos de idade, foi vítima de acidente com moto em zona rural. O Serviço de Atendimento Móvel de Urgência (SAMU) foi acionado e ao chegar ao local do acidente, o socorrista encontrou paciente com rebaixamento do nível de consciência apresentando as seguintes respostas frente aos estímulos feitos pelo socorrista:\n\n• abertura ocular ausente.\n• localização e retirada da mão do socorrista quando este causou estímulo doloroso.\n• emissão de sons incompreensíveis durante a estimulação dolorosa.\n• ambas as pupilas fotorreativas.",assertions:null,text:"A alternativa que apresenta a correta interpretação do número de pontos na Escala de Glasgow do paciente é:",opts:["8 pontos.","9 pontos.","6 pontos.","7 pontos."],g:0,exp:"abertura ocular ausente = 1 ponto\nlocalização e retirada da mão do socorrista quando este causou estímulo doloroso = 5\npontos\nemissão de sons incompreensíveis durante a estimulação dolorosa = 2 pontos\nambas as pupilas fotorreativas = -0 pontos\nTotal 8 pontos.",deep:"Escala de Glasgow (3-15) + Pupilas:\nAbertura Ocular: ausente=1, à pressão=2, ao som=3, espontânea=4\nResposta Verbal: ausente=1, sons=2, palavras=3, confusa=4, orientada=5\nResposta Motora: ausente=1, extensão=2, flexão anormal=3, flexão normal=4, localiza=5, obedece=6\nPupilas: ambas reativas=0, uma reativa=-1, nenhuma=-2\n\nNo caso: O1 + V2 + M5 + P0 = 8.\n\nRef: Porto CC. Semiologia Médica. 8ª ed. 2019."},
{n:2,disc:false,tema:"Sinais Meníngeos",src:"Afya 2023.2",context:"Paciente de 32 anos de idade, procura a UPA com queixa de febre, cefaleia, dor e formigamento em ambas as regiões palmares há 2 dias. O médico realiza alguns testes neurológicos para avaliação de sinais de irritação meníngeas e radiculares conforme descritos a seguir:\n\nI. Sinal de Kernig no qual o paciente permanece em decúbito dorsal no leito e em seguida, o médico realiza a extensão da perna, estando a coxa fletida em ângulo reto sobre a bacia e a perna sobre a coxa;\n\nII. Grafestesia oferecendo ao paciente objetos para que ele identifique, pelo tato, a forma e consistência do mesmo;\n\nIII. Sinal de Brudzinski no qual o paciente permanece em decúbito dorsal no leito, e o médico ao realizar flexão do quadril identifica uma rigidez de cervical;",assertions:null,text:"Diante dos exames realizados pelo profissional, assinale a alternativa correta:",opts:["A assertiva II refere-se a sinais de radiculopatia, sendo que a descrição do exame está correta.","As assertivas I e III referem-se a sinais de radiculopatia, sendo que a descrição do exame está correta na assertiva I e incorreta na III.","As assertivas I e III referem-se a sinais de irritação meníngea, sendo que a descrição do exame está correta na assertiva I e III.","As assertivas I e III referem-se a sinais de irritação meníngea, sendo que a descrição do exame está correta na assertiva I e incorreta na III."],g:3,exp:"1. Sinal de Kernig no qual o paciente permanece em decúbito dorsal no leito, e em\nseguida, o médico realiza a extensão da perna, estando a coxa fletida em ângulo reto\nsobre a bacia e a perna sobre a coxa;\nDescrição correta do exame, sendo esse teste usado para: diversas investigações como\nlombociatalgia, irritação meníngea, traumas, hérnias de disco e hemorragias subaracnóideas.\n2. Grafestesia oferecendo ao paciente objetos para que ele identifique, pelo tato, a forma e\nconsistência do mesmo.\nErro: Grafestesia refere-se à habilidade de reconhecer letras ou números escritos na palma da\nmão, não objetos. A descrição correta seria a oferta de letras ou números escritos pelo médico\nna palma da mão do paciente para que ele possa identificá-los pelo tato. Esse teste é utilizado\npara avaliação de sinais de radiculopatia.\n\n3. Sinal de Brudzinski no qual o paciente permanece em decúbito dorsal no leito, e o médico, ao\nrealizar flexão do pescoço, identifica uma rigidez do mesmo.\nErro: O Sinal de Brudzinski envolve flexionar o pescoço do paciente de forma passiva enquanto\nele está em decúbito dorsal (deitado de costas). Se houver flexão involuntária dos joelhos e\nquadris em resposta à flexão do pescoço, pode indicar rigidez na nuca, o que pode ser um sinal\nde irritação meníngea, como visto em casos de meningite.\nÉ importante sempre realizar os exames neurológicos corretamente para obter resultados\nprecisos e contribuir para um diagnóstico adequado.",deep:"Sinal de Kernig: decúbito dorsal, coxa fletida 90° → extensão da perna → limitação/dor = positivo.\nSinal de Brudzinski: flexão passiva do PESCOÇO → flexão involuntária de joelhos e quadris.\nGrafestesia: reconhecer letras/números escritos na palma (≠ estereognosia).\n\n❌ A: Grafestesia não é radiculopatia e descrição errada.\n❌ B: São sinais meníngeos, não de radiculopatia.\n❌ C: Descrição de III está incorreta.\n\nRef: Porto CC. Semiologia Médica. 8ª ed. 2019."},
{n:3,disc:false,tema:"OVACE — Criança",src:"Afya 2023.2",context:"Um residente de cirurgia estava almoçando em frente ao hospital quando escuta uma mãe gritando e batendo nas costas da filha. A criança de 5 anos encontra-se com engasgo total, pois tenta respirar e falar e não consegue. O residente prontamente oferece ajuda.",assertions:null,text:"Qual a alternativa que corresponde com a manobra que o residente deve aplicar nesta criança para ajudá-la desengasgar?",opts:["Manobra de Brudzinski. Posiciona-se ao lado da vítima de pé, na região do abdômen com as mãos estendidas uma sobre a outra e realize compressões.","Manobra de Ortolani. Posiciona-se ao lado da vítima com as mãos estendidas na região do abdome. Realize compressões.","Manobra de Heimlich. Posiciona-se atrás da vítima na região superior do abdômen, coloque uma das mãos fechada e posicione a outra em cima e realize compressões.","Manobra de Valsalva. Posiciona-se atrás da vítima em pé ou de joelhos e realize golpes nas costas e compressões."],g:2,exp:"a manobra correta para desengasgo é a manobra de Heimlich, onde o socorrista deve\nencontra-se por trás da vítima, posicionar a mão fechada abaixo do apêndice xifóide, colocar a\nmão oposta sobre a primeira e fazer quatro compressões firmes direcionadas para cima, sendo\nque as compressões devem ser realizadas em trancos para dentro e para cima, até que a\nvítima consiga expelir., colocar a mão oposta sobre a primeira e fazer quatro compressões\nfirmes direcionadas para cima, sendo que as compressões devem ser realizadas em trancos\npara dentro e para cima, até que a vítima consiga expelir. Em crianças maiores que 1 ano é\nindicado realizar a manobra da mesma forma que no adulto.\nAmerican Heart Association - Destaques das Diretrizes de RCP e ACE de 2020 da American\nHeart Association. Recurso online. Disponível em: <https://cpr.heart.org/-/media/CPR-Files/CPRGuidelines-Files/Highlights/Hghlghts_2020ECCGuidelines_Portuguese.pdf>. Acesso em: 09 de\nmaio de 2023.\nQUILICI, Ana Paula; TIMERMAN, Sergio (Ed.). Suporte básico de vida: primeiro atendimento na\nemergência para profissionais da saúde. São Paulo: Manole, 2011. 1 recurso online. ISBN\n9788520444924. Disponível em:\n<https://integrada.minhabiblioteca.com.br/reader/books/9788520444924>. Acesso em: 09 de\nmaio de 2023",deep:"OVACE grave + consciente + >1 ano → Heimlich:\n1) Por trás da vítima\n2) Mão fechada entre umbigo e apêndice xifóide\n3) Outra mão sobre a primeira\n4) Compressões em J (dentro e para cima)\n\n❌ A: Brudzinski = sinal meníngeo.\n❌ B: Ortolani = teste displasia quadril neonatal.\n❌ D: Valsalva = manobra respiratória/cardiovascular.\n\nRef: AHA 2020; QUILICI & TIMERMAN, SBV. Manole, 2011."},
{n:4,disc:true,tema:"SBV — PCR Adulto",src:"Afya 2023.2",context:"Um estudante de medicina está estagiando em uma UBS quando alguém informa que uma pessoa caiu. Encontra um homem de 60 anos em PCR. A UBS tem telefone, Pocket-Mask e DEA. Na unidade há um enfermeiro, dois técnicos de enfermagem, dois ACS e um recepcionista.\n\nDescreva detalhadamente como reconheceria a PCR e a sequência de atendimento até a chegada do suporte avançado de vida.",assertions:null,text:"Responda à questão acima de forma dissertativa.",opts:[],g:null,exp:"- Avaliar a responsividade da vítima, chamando-a e tocando-a nos ombros\n- Solicitar o DEA (presente na unidade)\n- Verificar a respiração e checar pulso carotídeo simultaneamente (em 5 a 10 segundos)\n- Iniciar ciclos de 30 compressões e 2 ventilações com uso da pocket-mask\n- Troca de funções a cada 5 ciclos ou 2 minutos\n- Chegada do DEA : ligue o DEA, conectar as pás ao tórax desnudo da vítima\n- Seguir os passos do DEA e analisar o ritmo cardíaco:\n- Se ritmo chocável, carregar e administrar o choque.\n- Se não ritmo chocável, reiniciar RCP\n- Reiniciar RCP, iniciados pelas compressões torácicas, 30 compressões e 2 ventilações por 2\nminutos",deep:"Protocolo C-A-B-D (SBC 2019):\nC: checar responsividade → chamar ajuda → checar pulso+respiração (≤10s) → compressões (100-120/min, 5-6cm)\nA: inclinar cabeça + elevar mento\nB: 2 ventilações de 1s (30:2)\nD: DEA assim que disponível\n\nRef: SBC. Arq Bras Cardiol. 2019; 113(3):449-663."},
{n:5,disc:false,tema:"Teste de Romberg",src:"Afya 2023.2",context:"Paciente de 74 anos, atendida em domicílio com queixas de desconforto e desequilíbrio durante a marcha. Relata sentir que um dos lados do corpo não está funcionando corretamente ao caminhar. Foi solicitado que o acadêmico realizasse os testes de equilíbrio.",assertions:null,text:"Neste cenário, marque a alternativa correta.",opts:["Deve ser realizado o Teste de Romberg, observando se o paciente fica em pé com os olhos fechados e pés juntos sem desequilibrar. O examinador deve ficar próximo para evitar quedas.","Deve-se solicitar que o paciente faça o teste de coordenação dedo-nariz, para avaliar se o teste de Romberg do paciente está alterado.","Deve-se realizar o teste de Stewart-Holmes, para avaliar se o paciente apresenta pequenas oscilações do corpo, com tendência a movimentar-se, estando assim positivo.","Deve-se solicitar que o paciente faça o teste de coordenação dedo-nariz, para avaliar se o mesmo apresenta disbasia."],g:0,exp:"O teste de Romberg é uma forma de avaliar o equilibrio estático. A prova é realizada com o\npaciente de pé e com os pés juntos. O mesmo deve olhar para frente ter os braços junto ao\ncorpo. O examinador então solicita que o paciente feche os olhos, ficando próximo para evitar\nquedas. Se houver forte tendencia a quedas consideramos o teste positivo.\nSemiologia Médica - Celmo Celeno Porto - 7ª Edição. 2013. Editora Guanabara Koogan.",deep:"Teste de Romberg:\n- Pé, pés juntos, braços ao lado\n- Olhar para frente → fechar olhos\n- Examinador próximo para segurança\n- Positivo: tendência a queda com olhos fechados\n- Indica: lesão proprioceptiva ou vestibular\n\n❌ B: Dedo-nariz = coordenação cerebelar.\n❌ C: Stewart-Holmes = rechaço cerebelar.\n❌ D: Dedo-nariz não avalia disbasia.\n\nRef: Porto CC. Semiologia Médica. 7ª/8ª ed."},
{n:6,disc:false,tema:"SBV — PCR Pediátrica",src:"Afya 2023.2",context:"Durante um evento esportivo, um estudante de medicina se depara com uma criança de aproximadamente 3 anos com sinais de PCR: pulso de 40 bpm e esforços respiratórios insuficientes, com respirações agonizantes.",assertions:null,text:"Qual das seguintes ações é a mais apropriada para o estudante como único socorrista realizar?",opts:["Observar e aguardar, pois a presença de pulso indica que não está em parada cardíaca.","Iniciar compressões torácicas a uma taxa de 100-120 compressões por minuto, mantendo uma relação compressão-ventilação de 30:2. Com as mãos posicionadas no centro do tórax e pocket mask invertida.","Realizar massagem cardíaca externa com frequência de pelo menos 100 compressões por minuto, enquanto mantém o pulso palpável.","Administrar 3 ventilações de resgate antes de iniciar compressões torácicas."],g:1,exp:"Nesse cenário de parada cardiorrespiratória (PCR) com um pulso detectado de 40 batimentos\npor minuto e esforços respiratórios insuficientes, é necessário iniciar imediatamente as\ncompressões torácicas para fornecer suporte circulatório adequado. A relação compressãoventilação para crianças é de 30 compressões seguidas por 2 ventilações. As compressões\ntorácicas devem ser realizadas a uma taxa de 100-120 compressões por minuto, com as\nmãos posicionadas no centro do tórax e pocket mask invertida.\nReferências:\n\nAmerican Heart Association (AHA). (2020). Pediatric Basic Life Support. In: Pediatric Advanced\nLife Support (PALS) Provider Manual. Dallas, TX: American Heart Association.\n\nSoar, J., Maconochie, I., Wyllie, J., et al. (2015). European Resuscitation Council Guidelines for\nResuscitation 2015: Section 6. Paediatric life support. Resuscitation, 95, 223-248.\n\nBerg, M. D., Schexnayder, S. M., Chameides, L., et al. (2010). Part 13: Pediatric Basic Life\nSupport: 2010 American Heart Association Guidelines for Cardiopulmonary Resuscitation and\nEmergency Cardiovascular Care. Circulation, 122(18_suppl_3), S862-S875.",deep:"PCR pediátrica funcional: FC <60 bpm + má perfusão\nSBV Pediátrico (1 socorrista): 30:2\nCompressões: 100-120/min, 1/3 diâmetro AP\nPocket mask invertida para crianças pequenas\n\n❌ A: 40 bpm + respiração agonizante = PCR funcional.\n❌ C: Descrição imprecisa.\n❌ D: Compressões ANTES de ventilações (C-A-B).\n\nRef: AHA 2020 PALS; SBC 2019."},
{n:7,disc:false,tema:"Uso do DEA",src:"Afya 2023.2",context:"Dois estudantes de medicina em um aeroporto presenciam um homem adulto cair no chão. Avaliam que está sem pulso carotídeo. Um inicia compressões enquanto o outro busca o DEA e pocket-mask. O equipamento chega em poucos minutos.",assertions:null,text:"Considerando a situação acima, assinale a afirmativa correta.",opts:["Utiliza-se a pocket-mask realizando 15 compressões e duas ventilações por dois minutos, antes da instalação do DEA.","Após um dos estudantes terminar 30 compressões o outro deve instalar o DEA.","Após terminar um ciclo de dois minutos de compressões, um dos estudantes deve instalar o DEA.","Imediatamente o DEA deve ser instalado para análise do ritmo e eventual necessidade de choque."],g:3,exp:"O DEA deve ser instalado assim que esteja disponível para análise do ritmo e eventual\nnecessidade de choque, para os ritmos fibrilação ventricular e taquicardia ventricular.",deep:"DEA: instalar IMEDIATAMENTE quando disponível.\nNão esperar completar compressões.\nRitmos chocáveis: FV e TV sem pulso.\nApós choque → RCP 2 min → nova análise.\n\n❌ A: 15:2 é pediátrico com 2 socorristas.\n❌ B/C: Não esperar.\n\nRef: AHA 2020; SBC 2019."},
{n:8,disc:true,tema:"Nervo Trigêmeo",src:"Afya 2023.2",context:"No ambulatório de neurologia, paciente de 45 anos queixa-se de dores intensas e recorrentes no lado direito do rosto, com formigamento e dormência. As dores são desencadeadas por atividades diárias como comer ou escovar os dentes.\n\na) Nomeie o nervo craniano acometido e suas divisões.\nb) Descreva o exame físico considerando: teste de sensibilidade, reflexo corneopalpebral, teste de força muscular da mastigação, reflexo nasofacial e reflexo mentoniano.",assertions:null,text:"Responda às questões a e b acima.",opts:[],g:null,exp:"a) Nervo trigêmeo possui três divisões: oftálmica (V1), maxilar (V2) e mandibular (V3)\nb) Teste de Sensibilidade: Avaliar sensações normais de toque e dor em todas as regiões\ntestadas. Deve ser testado com algodão em todas as 3 divisões do nervo trigêmeo.\nReflexo Corneopalpebral: tocar leve e cuidadosamente a córnea (o toque na esclera pode\nser falso negativo) com uma pequena mecha de algodão umedecido ou uma simples gota de\nsoro fisiológico, e espera-se que, em resposta, o paciente pisque direta e consensualmente.\nPeça ao paciente que olhe na direção oposta ao olho que irá testar e aborde o olho pela lateral.\nEstes cuidados procuram evitar que o paciente pisque pela visão do objeto que se aproxima\nantes do toque.\nTeste de Força Muscular da Mastigação: solicitar ao paciente que contraia com força a\nmandíbula de encontro à maxila. Enquanto palpamos o masséter e o temporal superficial, abra\na boca contra resistência. Também podemos verificar a impressão dentária dos molares ao\ninterpormos um abaixador de língua entre os maxilares e solicitarmos que o paciente feche a\nboca com força. Note-se que, na paralisia unilateral do trigêmeo, o desvio homolateral da\nmandíbula é perceptível quando se solicita ao paciente que abra a boca.\nReflexos nasofacial e mentoniano: reflexo nasofacial se introduz um pedaço de algodão no\norificio da narina e como resposta reflexa acontece um espirro ou expressões contrateis faciais\n. O reflexo mentoniano há uma percussão com martelo na região mentoniana com a boca\nentre aberta e como resposta reflexa há contração do masseter no sentido de fechar a boca.\nPORTO, C. C. Semiologia médica. 8. ed. Rio de Janeiro: Guanabara Koogan, 2019.\nPORTO, C. C.; PORTO, A.L. Exame Clínico. 8. ed. Rio de Janeiro: Guanabara Koogan, 2017.",deep:"Nervo Trigêmeo (V):\n- V1 (oftálmico): fronte, pálpebra superior\n- V2 (maxilar): bochecha, lábio superior\n- V3 (mandibular): mandíbula, lábio inferior + mastigação\n\nReflexo córneo-palpebral: aferência=V1, eferência=VII\n\nRef: Porto CC. Semiologia Médica. 8ª ed. 2019."},
{n:9,disc:false,tema:"Campimetria / Via Óptica",src:"Afya 2023.2",context:"Paciente de 33 anos com tumor de hipófise suprasselar, queixa visual por lesão do quiasma ótico, com comprometimento da inervação da retina nasal bilateral.",assertions:null,text:"Assinale a alternativa que melhor representa a campimetria do paciente:",opts:["Comprometimento por não perceber estímulos visuais com o olho direito.","Comprometimento por não perceber estímulos visuais nos campos visuais temporais bilateralmente.","Comprometimento por não perceber estímulos visuais nos campos visuais nasais bilateralmente.","Comprometimento por não perceber estímulos visuais com o olho esquerdo."],g:1,exp:"Lesões do quiasma ótico interrompem a condução nervosa do segundo par craniano afetando a\nregião nasal da retina bilateralmente, comprometendo assim os campos visuais temporais\nbilateralmente. As anotações das alterações são realizadas em relação ao campo visual\nacometido e não em relação a região da retina afetada.\n\nFonte Bibliográfica:\nPORTO, C. C. Semiologia Médica. 8. ed. Rio de Janeiro: Guanabara Koogan, 2019. recurso\nonline. ISBN 978-85-277-3498-1. Disponível em:\n<https://integrada.minhabiblioteca.com.br/#/books/9788527734998>. Acesso em: 28 out.\n2019.",deep:"Via óptica — topografia:\n1) Nervo óptico: amaurose unilateral\n2) Quiasma: hemianopsia bitemporal\n3) Trato óptico: hemianopsia homônima contralateral\n\n❌ A/D: Perda monocular = nervo óptico.\n❌ C: Campos nasais = fibras temporais.\n\nRef: Porto CC. Semiologia Médica. 8ª ed. 2019."},
{n:10,disc:false,tema:"Testes Ortopédicos",src:"Afya 2023.2",context:"Paciente masculino, 42 anos, acidente de moto com luxação de quadril, rompimento ligamentar do joelho e luxação de tornozelo. Após 2 meses de cirurgias, procura a UBS com dor intensa em joelho direito, dificuldade de movimento e instabilidade. O médico decide realizar testes para quadril, joelho e tornozelo.",assertions:null,text:"Identifique o tipo de teste representado respectivamente na ordem como estão apresentados.",opts:["Teste de Apley, teste de McMurray, teste de Tinel.","Teste de gaveta anterior, teste de Thomas, teste de Patrick.","Teste de Patrick, teste de McMurray, teste de gaveta anterior.","Teste de Trendelenburg, teste de Apley, teste de Gaenslen."],g:2,exp:"O exame físico direcionado às queixas ortopédicas segue princípios da semiologia geral tais\ncomo: inspeção (estática e dinâmica), palpação, amplitude de movimento, avaliação da forca\nmuscular, avaliação neurológica e os “testes específicos”. A questão envolve imagens\ndescritivas de três testes, respectivamente do quadril, joelho e tornozelo, onde o aluno deve\nsaber identicar cada um dos testes através da imagem.\nTeste de Patrick é um teste especial realizado em um exame físico para avaliar as articulação\nsacroilíaca e do quadril de pacientes que possuem dor lombar.\nNo teste, é realizado a manobra de Flexão, Abdução e Rotação Externa (FABERE) do membro\ninferior. O teste permite ao avaliador realizar um estresse articular na região sacroilíaca, visando\nreproduzir a dor referida pelo paciente.\nTeste de MCMurray: Para testar o menisco medial, o examinador palpa a face póstero-medial\ndo joelho enquanto estende o joelho e giram externamente a tíbia. Um estresse\nem valgo também é aplicado. Para testar o menisco lateral, o examinador palpa a linha articular\npóstero-lateral, estendendo o joelho e girando internamente a tíbia. Um estresse\nem varo também é aplicado.\nTeste de gaveta anterior: realizado para testar a integralidade do ligamento talofibular\nanterior e a porção ântero-lateral da cápsula articular, o médico segura firmemente com uma\nmão a tíbia e com a outra mão exerce uma tração anterior no nível de calcâneo e observa o\ngrau de deslocamento.\nReferência bibliográfica:\nPORTO, C. C. Semiologia Médica. 8. ed. Rio de Janeiro: Guanabara Koogan, 2019. recurso\nonline. ISBN 978-85-277-3498-1. Disponível em:\n<https://integrada.minhabiblioteca.com.br/reader/books/9788527734998>. Acesso em: 09 de\nmaio de 2023.\nPORTO, C. C.; PORTO, A.L. Exame Clínico. 8. ed. Rio de Janeiro: Guanabara Koogan, 2017.\nrecurso online. ISBN 978-85-277-3103-4. Disponível em:\n<https://integrada.minhabiblioteca.com.br/reader/books/9788527731034> Acesso em: 09 de\nmaio de 2023.",deep:"1) Patrick (FABERE): Flexão+Abdução+Rotação Externa.\n2) McMurray: extensão + rotação + estresse varo/valgo.\n3) Gaveta anterior (tornozelo): tração anterior do calcâneo.\n\n❌ A: Apley=compressão meniscal; Tinel=nervo periférico.\n❌ B: Thomas=flexão fixa quadril.\n❌ D: Trendelenburg=glúteo médio.\n\nRef: Porto CC. 2019; Cipriano JJ. 2012."}];

const L = ['a','b','c','d'];
let cur = 0, sel = null, answered = {}, eliminated = {};

function buildPills(){const w=document.getElementById('qPills');w.innerHTML='';for(let i=0;i<QS.length;i++){const b=document.createElement('button');b.className='qp';b.id='qp'+i;b.textContent=i+1;b.onclick=(function(idx){return function(){goTo(idx);};})(i);w.appendChild(b);}}
function syncPills(){for(let i=0;i<QS.length;i++){const p=document.getElementById('qp'+i);if(!p)continue;p.className='qp';if(i===cur)p.classList.add('current');if(answered[i]!==undefined){if(QS[i].disc)p.classList.add('disc');else p.classList.add(answered[i]===QS[i].g?'correct':'wrong');}}}
function renderQ(){const q=QS[cur];sel=(answered[cur]!==undefined)?answered[cur]:null;const done=answered[cur]!==undefined;document.getElementById('qTagNum').textContent='Quest\u00e3o '+q.n;document.getElementById('qTagTema').textContent=q.tema;document.getElementById('qCounterNum').textContent=q.n;const discSep=document.getElementById('qTagDiscSep');const discTag=document.getElementById('qTagDisc');if(q.disc){discSep.style.display='';discTag.style.display='';}else{discSep.style.display='none';discTag.style.display='none';}const ctx=document.getElementById('qContext');if(q.context){ctx.style.display='block';ctx.textContent=q.context;}else{ctx.style.display='none';}const asr=document.getElementById('qAssertions');if(q.assertions){asr.style.display='block';asr.innerHTML=q.assertions.replace(/\n/g,'<br>');}else{asr.style.display='none';}document.getElementById('qText').innerHTML=q.text.replace(/\n/g,'<br>');const wrap=document.getElementById('qOpts');wrap.innerHTML='';if(q.disc){const ta=document.createElement('textarea');ta.className='disc-answer';ta.placeholder='Escreva sua resposta aqui...';if(done){ta.disabled=true;ta.value=answered[cur]||'';}wrap.appendChild(ta);}else{q.opts.forEach(function(o,i){const btn=document.createElement('button');btn.className='q-opt';if(done){btn.setAttribute('disabled','');if(i===q.g)btn.classList.add('correct');else if(i===sel&&i!==q.g)btn.classList.add('wrong');}else if(sel===i){btn.classList.add('selected');}const isElim=!done&&eliminated[cur]&&eliminated[cur].has(i);if(isElim)btn.classList.add('eliminated');btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span class="opt-text">'+o+'</span><button class="opt-elim-btn" title="Eliminar alternativa"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';if(!done){(function(idx){btn.onclick=function(e){if(e.target.closest('.opt-elim-btn'))return;selectOpt(idx);};btn.querySelector('.opt-elim-btn').onclick=function(e){e.stopPropagation();if(!eliminated[cur])eliminated[cur]=new Set();if(eliminated[cur].has(idx)){eliminated[cur].delete(idx);btn.classList.remove('eliminated');}else{eliminated[cur].add(idx);btn.classList.add('eliminated');if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}}};})(i);}else{btn.querySelector('.opt-elim-btn').style.display='none';}wrap.appendChild(btn);});}const fb=document.getElementById('qFeedback');const aiBox=document.getElementById('aiBox');if(done){const isDisc=q.disc;const ok=!isDisc&&sel===q.g;const fbClass=isDisc?'fb-disc':(ok?'fb-ok':'fb-err');const fbLabel=isDisc?'\u270d Gabarito comentado':(ok?'\u2713 Correto!':'\u2717 Incorreto \u2014 Gabarito: '+L[q.g].toUpperCase());fb.className='q-feedback show '+fbClass;fb.innerHTML='<span class="fb-label">'+fbLabel+'</span><span class="fb-short">'+q.exp+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">\u2726 Aprofundar com IA</button>';aiBox.classList.remove('open');document.getElementById('aiContent').textContent='';}else{fb.className='q-feedback';fb.innerHTML='';aiBox.style.display='none';aiBox.classList.remove('open');}document.getElementById('btnPrev').disabled=(cur===0);const btnN=document.getElementById('btnNext');if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}else{btnN.innerHTML='Pr\u00f3xima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}const btnR=document.getElementById('btnRespond');if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(!q.disc&&sel===null);}syncPills();}
function toggleAI(qIdx){const aiBox=document.getElementById('aiBox');const btnAI=document.getElementById('btnAI');if(aiBox.classList.contains('open')){aiBox.classList.remove('open');if(btnAI)btnAI.classList.remove('active');}else{document.getElementById('aiContent').textContent=QS[qIdx].deep;aiBox.style.display='block';aiBox.classList.add('open');if(btnAI)btnAI.classList.add('active');}}
function selectOpt(i){if(answered[cur]!==undefined)return;sel=i;document.getElementById('btnRespond').disabled=false;document.querySelectorAll('.q-opt').forEach(function(o,idx){if(!o.classList.contains('eliminated')){o.className='q-opt'+(idx===i?' selected':'');}(function(ii){o.onclick=function(e){if(!e.target.closest('.opt-elim-btn'))selectOpt(ii);};})(idx);});}
function submitAnswer(){if(answered[cur]!==undefined)return;const q=QS[cur];if(q.disc){const ta=document.querySelector('.disc-answer');answered[cur]=ta?ta.value:'';}else{if(sel===null)return;answered[cur]=sel;}renderQ();if(Object.keys(answered).length===QS.length){setTimeout(showResult,350);}}
function prevQ(){if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
function nextQ(){if(cur===QS.length-1){showResult();return;}cur++;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function goTo(i){cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function showResult(){document.getElementById('qCard').style.display='none';const rs=document.getElementById('resultScreen');rs.classList.add('show');const mcQs=QS.filter(function(q){return!q.disc;});const discQs=QS.filter(function(q){return q.disc;});const answeredMC=mcQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;});const correct=answeredMC.filter(function(q){return answered[QS.indexOf(q)]===q.g;}).length;const total=answeredMC.length;const pct=total>0?Math.round((correct/mcQs.length)*100):0;const ring=document.getElementById('resRing');ring.textContent=pct+'%';ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');document.getElementById('resTitle').textContent=pct>=70?'Parab\u00e9ns!':pct>=50?'Quase l\u00e1!':'Continue praticando!';document.getElementById('resSub').textContent='Voc\u00ea acertou '+correct+' de '+total+' quest\u00f5es de m\u00faltipla escolha ('+pct+'%)';document.getElementById('resOk').textContent=correct;document.getElementById('resErr').textContent=total-correct;document.getElementById('resDisc').textContent=discQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;}).length;document.getElementById('resSkip').textContent=QS.length-Object.keys(answered).length;buildReport(correct,total);rs.scrollIntoView({behavior:'smooth',block:'start'});}
function buildReport(correct,total){const temaStats={};QS.forEach(function(q,i){if(!temaStats[q.tema])temaStats[q.tema]={total:0,correct:0,wrong:0,disc:0};const t=temaStats[q.tema];t.total++;if(q.disc){t.disc++;}else if(answered[i]===undefined){}else if(answered[i]===q.g){t.correct++;}else{t.wrong++;}});const sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});let barsHtml='';sorted.forEach(function(tema){const s=temaStats[tema];const mc=s.total-s.disc;if(mc===0){barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill purple" style="width:100%"></div></div><span class="tema-pct purple">Disc.</span></div>';return;}const pct=Math.round((s.correct/mc)*100);const isGood=pct>=50;barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill '+(isGood?'green':'red')+'" style="width:'+pct+'%"></div></div><span class="tema-pct '+(isGood?'green':'red')+'">'+pct+'%</span></div>';});const worstTema=sorted.find(function(t){return temaStats[t].wrong>0;})||'\u2014';const bestTema=sorted.slice().reverse().find(function(t){const s=temaStats[t];return(s.total-s.disc)>0&&s.correct>0;})||'\u2014';const pct=total>0?Math.round((correct/total)*100):0;const streakMsg=pct>=70?'\u00d3timo dom\u00ednio geral!':pct>=50?'Foque nos pontos fracos.':'Revise os conte\u00fados antes da prova.';let wrongHtml='';QS.forEach(function(q,i){if(!q.disc&&answered[i]!==undefined&&answered[i]!==q.g){wrongHtml+='<div class="q-rev-row" onclick="goToQ('+i+')"><div class="rev-dot dot-err"></div><span>Q'+q.n+' \u2014 '+q.tema+'</span><small>Resp: '+L[answered[i]].toUpperCase()+' \u00b7 Gabarito: '+L[q.g].toUpperCase()+'</small></div>';}});if(!wrongHtml)wrongHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro registrado \ud83c\udf89</div>';document.getElementById('reportContent').innerHTML='<div class="report-section"><h4>Desempenho por tema</h4><div>'+barsHtml+'</div></div><div class="report-section"><h4>Insights</h4><div class="insight-grid"><div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Maior incid\u00eancia de erros</div></div><div class="insight-box"><div class="ib-label">Melhor desempenho</div><div class="ib-val">'+bestTema+'</div><div class="ib-sub">Maior taxa de acerto</div></div><div class="insight-box"><div class="ib-label">Aproveitamento</div><div class="ib-val">'+correct+'/'+total+'</div><div class="ib-sub">'+streakMsg+'</div></div><div class="insight-box"><div class="ib-label">Quest\u00f5es puladas</div><div class="ib-val">'+(QS.length-Object.keys(answered).length)+'</div><div class="ib-sub">Sem resposta registrada</div></div></div></div><div class="report-section"><h4>Quest\u00f5es erradas</h4><div class="q-review-list">'+wrongHtml+'</div></div>';}
function goToQ(i){document.getElementById('qCard').style.display='block';document.getElementById('resultScreen').classList.remove('show');cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function resetAll(){answered={};sel=null;cur=0;eliminated={};document.getElementById('resultScreen').classList.remove('show');document.getElementById('qCard').style.display='block';renderQ();window.scrollTo({top:0,behavior:'smooth'});}
buildPills();renderQ();
var hlOn=false; function toggleHL(){hlOn=!hlOn;document.querySelectorAll('.hl-toggle').forEach(function(b){b.classList.toggle('active',hlOn);});document.body.classList.toggle('hl-active',hlOn);} document.addEventListener('mouseup',hlHandle);document.addEventListener('touchend',hlHandle); function hlHandle(e){if(!hlOn)return;var s=window.getSelection();if(!s||s.isCollapsed||!s.rangeCount)return;var r=s.getRangeAt(0);var p=r.commonAncestorContainer;if(p.nodeType===3)p=p.parentNode;var qb=p.closest?p.closest('.q-body'):null;if(!qb){var sc=r.startContainer;if(sc.nodeType===3)sc=sc.parentNode;qb=sc.closest?sc.closest('.q-body'):null;}if(!qb)return;if(e.target&&e.target.closest&&e.target.closest('mark.hl'))return;var t=s.toString().trim();if(!t||t.length<2)return;try{var m=document.createElement('mark');m.className='hl';m.title='Clique para remover';r.surroundContents(m);}catch(ex){try{var f=r.extractContents();var m2=document.createElement('mark');m2.className='hl';m2.title='Clique para remover';m2.appendChild(f);r.insertNode(m2);}catch(ex2){}}s.removeAllRanges();} document.addEventListener('click',function(e){if(!hlOn)return;var m=e.target.closest?e.target.closest('mark.hl'):null;if(!m)return;var p=m.parentNode;while(m.firstChild)p.insertBefore(m.firstChild,m);p.removeChild(m);p.normalize();});
</script>
