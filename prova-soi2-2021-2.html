<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N1 SOI II 2021.2 | Afyados</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* CSS ORIGINAL MANTIDO */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}

nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}

/* ALTERAÇÃO 3: LOGO IGUAL AO INDEX */
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg, #D6006E, #9B00E8);border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 15px rgba(214,0,110,0.3);}
.logo-mark svg{width:18px;height:18px;fill:white;}
.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:18px;letter-spacing:.05em;color:#fff;background:linear-gradient(to right, #fff, #D8CEEA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}
.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}

.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}
.sticky-inner{max-width:820px;margin:0 auto;}
.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sticky-aviso{display:flex;align-items:center;gap:8px;font-size:11px;color:#FAAD3F;font-weight:600;margin-bottom:8px;padding:5px 10px;background:rgba(186,113,0,0.1);border-radius:6px;border:1px solid rgba(186,113,0,0.2);}
.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}
.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}
.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;}
.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}
.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}
.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}

.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}

.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}
.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}
.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}

/* ALTERAÇÃO 1: REMOÇÃO DO BLOCO VERDE (Apenas texto limpo) */
.q-context{font-size:14px;color:var(--muted);line-height:1.85;margin-bottom:20px;padding:0;background:transparent;border:none;white-space:pre-line;}

.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;}
.q-body{padding:28px;}

/* ALTERAÇÃO 2: ESTILO DA TESOURINHA */
.opt-container { display: flex; align-items: flex-start; gap: 10px; width: 100%; position: relative; }
.btn-scissors { 
    background: transparent; border: none; cursor: pointer; color: var(--muted); 
    padding: 14px 5px; transition: all 0.2s; opacity: 0.4;
}
.btn-scissors:hover { opacity: 1; color: #ff4d4d; }
.btn-scissors.active { opacity: 1; color: #ff4d4d; filter: drop-shadow(0 0 5px rgba(255,77,77,0.5)); }
.q-opt.eliminated { opacity: 0.3; text-decoration: line-through; filter: grayscale(1); }

.q-opts{display:flex;flex-direction:column;gap:9px;}
.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}
.q-opt:hover:not([disabled]):not(.eliminated){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}
.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}
.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}
.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);}

/* FEEDBACK E OUTROS MANTIDOS */
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}
.q-feedback.show{display:block;animation:fadeUp .25s ease;}
.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}
.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}
.fb-disc{background:rgba(155,0,232,0.07);border-color:rgba(155,0,232,0.25);color:#E8D8FF;}
.fb-label{font-weight:700;display:block;margin-bottom:6px;}

.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.07),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:14px;overflow:hidden;display:none;}
.ai-box.open{display:block;animation:fadeUp .3s ease;}
.ai-content{padding:18px;font-size:14px;line-height:1.9;color:#E8D8FF;white-space:pre-line;}

.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}
.btn-prev, .btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;box-shadow:0 4px 16px var(--pink-glow);}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 19h4l2-4h8l2 4h4L12 2zm0 5l3 6H9l3-6z"/></svg>
    </div>
    <span class="logo-name">AFYADOS</span>
  </a>
  <a href="simulados2.html" class="back-btn">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Voltar aos simulados
  </a>
</nav>

<div class="sticky-bar">
  <div class="sticky-inner">
    <div class="sticky-aviso">
      <svg width="13" height="13" fill="none" stroke="#FAAD3F" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
      <span>PDF incompleto — algumas questões podem estar ausentes ou com enunciado parcial.</span>
    </div>
    <div class="sticky-top">
      <span class="sticky-title">N1 SOI II · 2021.2 &nbsp;·&nbsp; Gabarito de questões</span>
      <button class="btn-reset" onclick="resetAll()">Resetar lista</button>
    </div>
    <div class="q-pills" id="qPills"></div>
  </div>
</div>

<div class="main">
  <div class="result-screen" id="resultScreen" style="display:none;"></div>

  <div class="q-card" id="qCard">
    <div class="q-card-header">
      <span class="q-tag" id="qTagNum">Questão 1</span>
      <span class="q-tag-tema" id="qTagTema"></span>
    </div>
    <div class="q-body">
      <div class="q-context" id="qContext"></div>
      <div class="q-text" id="qText"></div>
      <div class="q-opts" id="qOpts"></div>
    </div>
    <div class="q-feedback" id="qFeedback"></div>
    <div class="ai-box" id="aiBox">
        <div class="ai-content" id="aiContent"></div>
    </div>
    <div class="q-nav-bar">
      <button class="btn-prev" id="btnPrev" onclick="prevQ()">Anterior</button>
      <span class="q-counter">Questão <strong id="qCounterNum">1</strong> de <strong>7</strong></span>
      <div class="nav-right">
        <button class="btn-respond" id="btnRespond" onclick="submitAnswer()">Responder</button>
        <button class="btn-next" id="btnNext" onclick="nextQ()">Próxima</button>
      </div>
    </div>
  </div>
</div>

<script>
// Dados do Simulado (Simplificado para o exemplo, use seus dados originais)
var QS = [
  {n:1,tema:"Doença de Huntington",tipo:"mc", context:"Em um episódio de House, M.D., pode ser observado a personagem Remy Hadley...", text:"É correto o que se afirma em:", opts:["I, III e IV.","II e III.","I e IV.","II, III e IV."], g:0},
  {n:2,tema:"Nervos Espinais",tipo:"mc", context:"A medula espinhal possui formato cilíndrico...", text:"Assinale a alternativa que descreve a associação correta:", opts:["Opção A","Opção B","Opção C","Opção D"], g:2},
  // ... adicione as outras questões aqui
];

var cur = 0;
var answered = {};
var eliminated = {}; // ALTERAÇÃO 2: Estado para as tesourinhas

function renderQ() {
    var q = QS[cur];
    var done = answered[cur] !== undefined;
    
    document.getElementById('qTagNum').textContent = 'Questão ' + q.n;
    document.getElementById('qTagTema').textContent = q.tema;
    document.getElementById('qContext').textContent = q.context;
    document.getElementById('qText').innerHTML = q.text;
    
    var wrap = document.getElementById('qOpts');
    wrap.innerHTML = '';
    
    q.opts.forEach(function(o, i) {
        var container = document.createElement('div');
        container.className = 'opt-container';
        
        // ALTERAÇÃO 2: Botão Tesourinha
        var scissors = document.createElement('button');
        scissors.className = 'btn-scissors';
        if (eliminated[cur] && eliminated[cur][i]) scissors.classList.add('active');
        scissors.innerHTML = '✂️';
        scissors.onclick = function(e) { 
            e.stopPropagation(); 
            toggleEliminate(i); 
        };
        if (done) scissors.style.display = 'none';

        var btn = document.createElement('button');
        btn.className = 'q-opt';
        if (eliminated[cur] && eliminated[cur][i]) btn.classList.add('eliminated');
        if (done) {
            btn.setAttribute('disabled', '');
            if (i === q.g) btn.classList.add('correct');
            else if (i === answered[cur]) btn.classList.add('wrong');
        }
        
        btn.innerHTML = '<span class="opt-badge">' + String.fromCharCode(65 + i) + '</span><span>' + o + '</span>';
        btn.onclick = function() { selectOpt(i); };
        
        container.appendChild(scissors);
        container.appendChild(btn);
        wrap.appendChild(container);
    });

    document.getElementById('btnRespond').style.display = done ? 'none' : 'flex';
    document.getElementById('qFeedback').style.display = done ? 'block' : 'none';
    if(done) document.getElementById('qFeedback').innerHTML = "<span class='fb-label'>Gabarito: " + String.fromCharCode(65 + q.g) + "</span>";
}

function toggleEliminate(optIdx) {
    if (!eliminated[cur]) eliminated[cur] = {};
    eliminated[cur][optIdx] = !eliminated[cur][optIdx];
    renderQ();
}

function selectOpt(i) {
    if (answered[cur] !== undefined) return;
    answered[cur] = i;
    renderQ();
}

function nextQ() { if(cur < QS.length-1) { cur++; renderQ(); } }
function prevQ() { if(cur > 0) { cur--; renderQ(); } }
function resetAll() { answered = {}; eliminated = {}; cur = 0; renderQ(); }

renderQ();
</script>
</body>
</html>
