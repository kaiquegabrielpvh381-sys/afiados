  {n:1,tema:"Nervos Cranianos e Sentidos Especiais",tipo:"mc",
   context:"(UNIDEP) Os cinco sentidos especiais (visão, audição, equilíbrio, gustação e olfação) contam com receptores localizados na região da cabeça e nervos cranianos que conduzem os impulsos nervosos até o sistema nervoso central.\n\nSobre os nervos cranianos relacionados com os sentidos especiais, avalie as asserções a seguir e a relação proposta entre elas.\n\nI. O nervo olfatório, ou nervo craniano I, é formado por axônios que conduzem impulsos nervosos do epitélio olfatório até o bulbo olfatório. Assim como os nervos cranianos relacionados com os sentidos da visão, equilíbrio e audição, o nervo craniano I é exclusivamente sensitivo. O único sentido especial conduzido por nervos cranianos mistos é a gustação, associada aos nervos facial, glossofaríngeo e vago.\n\nPORQUE\n\nII. Os nervos cranianos II e VIII são exclusivamente sensitivos. A visão é relacionada com o nervo craniano II, o nervo óptico, formado pelos axônios das células ganglionares da retina. A audição e o equilíbrio são relacionados com o nervo craniano VIII, o nervo vestibulococlear, o qual se divide em ramo coclear (audição) e ramo vestibular (equilíbrio).",

var L = ['a','b','c','d','e'];
var cur = 0, sel = null, answered = {}, discAnswered = {};

function buildPills(){
  var w = document.getElementById('qPills'); w.innerHTML = '';
  for(var i=0;i<QS.length;i++){
    var b = document.createElement('button');
    b.className='qp'; b.id='qp'+i; b.textContent=i+1;
    (function(idx){ b.onclick = function(){ goTo(idx); }; })(i);
    w.appendChild(b);
  }
}
function syncPills(){
  for(var i=0;i<QS.length;i++){
    var p=document.getElementById('qp'+i); if(!p) continue;
    p.className='qp';
    if(i===cur) p.classList.add('current');
    var q=QS[i];
    if(q.tipo==='disc'){ if(discAnswered[i]) p.classList.add('disc'); }
    else { if(answered[i]!==undefined) p.classList.add(answered[i]===q.g?'correct':'wrong'); }
  }
}

function renderQ(){
  var q=QS[cur];
  sel=(answered[cur]!==undefined)?answered[cur]:null;
  var done = q.tipo==='disc' ? !!discAnswered[cur] : answered[cur]!==undefined;
  document.getElementById('qTagNum').textContent='Questão '+q.n;
  document.getElementById('qTagTema').textContent=q.tema;
  document.getElementById('qCounterNum').textContent=q.n;
  var discTag = document.getElementById('qTagDisc');
  discTag.style.display = q.tipo==='disc' ? 'inline-flex' : 'none';
  var ctx=document.getElementById('qContext');
  if(q.context){ 
    ctx.style.display='block'; 
    var html = q.context.replace(/\n/g,'<br>');
    html = html.replace('[[IMG_Q13]]', '<img src="imagem_q13.jpg" alt="Tronco Encefálico" style="max-width:100%; border-radius:8px; display:block; margin:16px auto; border:1px solid rgba(255,255,255,0.1);">');
    ctx.innerHTML=html;
  }
  else { ctx.style.display='none'; }
  document.getElementById('qText').innerHTML = q.text ? q.text.replace(/\n/g,'<br>') : '';
  var wrap=document.getElementById('qOpts'); wrap.innerHTML='';
  if(q.tipo==='disc'){
    var ta=document.createElement('textarea');
    ta.className='disc-area'; ta.id='discInput';
    ta.placeholder='Escreva sua resposta aqui...';
    if(done){ ta.disabled=true; ta.value=discAnswered[cur]||''; }
    wrap.appendChild(ta);
  } else {
    q.opts.forEach(function(o,i){
      var btn=document.createElement('button'); btn.className='q-opt';
      if(done){btn.setAttribute('disabled','');if(i===q.g)btn.classList.add('correct');else if(i===sel&&i!==q.g)btn.classList.add('wrong');}
      else if(sel===i){btn.classList.add('selected');}
      btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span>'+o+'</span>';
      if(!done){(function(idx){btn.onclick=function(){selectOpt(idx);};})(i);}
      wrap.appendChild(btn);
    });
  }
  var fb=document.getElementById('qFeedback');
  var aiBox=document.getElementById('aiBox');
  if(done){
    if(q.tipo==='disc'){
      fb.className='q-feedback show fb-disc';
      fb.innerHTML='<span class="fb-label">📋 Gabarito comentado</span><span class="fb-exp">'+q.resposta.replace(/\n/g,'<br>')+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">✦ Aprofundar com IA</button>';
    } else {
      var ok=sel===q.g;
      fb.className='q-feedback show '+(ok?'fb-ok':'fb-err');
      fb.innerHTML='<span class="fb-label">'+(ok?'✓ Correto!':'✗ Incorreto — Gabarito: '+L[q.g].toUpperCase())+'</span><span class="fb-exp">'+SHORT[cur]+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">✦ Aprofundar com IA</button>';
    }
    aiBox.style.display='none'; aiBox.classList.remove('open');
    document.getElementById('aiContent').innerHTML=DEEP[cur].replace(/\n/g,'<br>');
  } else { fb.className='q-feedback'; fb.innerHTML=''; aiBox.style.display='none'; }
  document.getElementById('btnPrev').disabled=(cur===0);
  var btnN=document.getElementById('btnNext');
  if(cur===QS.length-1){btnN.innerHTML='Ver resultado';}
  else{btnN.innerHTML='Próxima';}
  var btnR=document.getElementById('btnRespond');
  if(done){btnR.style.display='none';}
  else{ btnR.style.display='flex'; if(q.tipo==='disc') btnR.disabled=false; else btnR.disabled=(sel===null); }
  syncPills();
}

function toggleAI(qIdx){
  var aiBox=document.getElementById('aiBox');
  var btnAI=document.getElementById('btnAI');
  if(aiBox.classList.contains('open')){ aiBox.classList.remove('open'); if(btnAI) btnAI.classList.remove('active'); }
  else { aiBox.style.display='block'; aiBox.classList.add('open'); if(btnAI) btnAI.classList.add('active'); }
}
function selectOpt(i){
  if(answered[cur]!==undefined) return; sel=i; document.getElementById('btnRespond').disabled=false;
  var opts=document.querySelectorAll('.q-opt');
  opts.forEach(function(o,idx){ o.className='q-opt'+(idx===i?' selected':''); });
}
function submitAnswer(){
  var q=QS[cur];
  if(q.tipo==='disc'){ var ta=document.getElementById('discInput'); discAnswered[cur]=ta?ta.value.trim():''; }
  else { if(sel===null||answered[cur]!==undefined) return; answered[cur]=sel; }
  renderQ();
}
function prevQ(){if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
function nextQ(){if(cur===QS.length-1){showResult();return;}cur++;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function goTo(i){cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}

function showResult(){
  document.getElementById('qCard').style.display='none';
  var rs=document.getElementById('resultScreen'); rs.classList.add('show');
  var mcQs=QS.filter(function(q){return q.tipo==='mc';});
  var correct=mcQs.filter(function(q){return answered[QS.indexOf(q)]===q.g;}).length;
  var pct=Math.round((correct/mcQs.length)*100);
  document.getElementById('resRing').textContent=pct+'%';
  document.getElementById('resSub').textContent='Você acertou '+correct+' de '+mcQs.length+' questões.';
  document.getElementById('resOk').textContent=correct;
  document.getElementById('resErr').textContent=mcQs.length-correct;
  document.getElementById('resDisc').textContent=Object.keys(discAnswered).length;
}

function resetAll(){ location.reload(); }
buildPills(); renderQ();
</script>
</body>
</html>
