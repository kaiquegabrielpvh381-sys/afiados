<style>
/* --- DESIGN SYSTEM AFYADOS (PREMIUM DARK/PINK) --- */
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--bg:#0C0810;--card:#1A1226;--border:rgba(255,255,255,0.07);--border-pink:rgba(214,0,110,0.3);--text:#F4EFFA;--muted:#9080A8;--light:#D8CEEA;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6; padding-top: 68px;}

/* NAV BASE */
nav{position:fixed;top:0;width:100%;z-index:500;height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:rgba(12,8,16,0.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.logo-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:9px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px var(--pink-glow);}
.logo-mark svg{width:18px;height:18px;fill:white;}
.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:18px;letter-spacing:.06em;color:#FFF;}
.back-btn{display:flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;padding:8px 18px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}
.back-btn:hover{border-color:var(--border-pink);color:var(--pink-light);}

/* HERO */
.hero{padding:100px 48px 40px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 30%,rgba(214,0,110,0.1),transparent 70%);}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,42px);font-weight:900;line-height:1.1;margin-bottom:12px;position:relative;}
.hero h1 em{font-style:italic;background:linear-gradient(135deg,var(--pink-bright),var(--pink-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* --- MECÂNICA DO QUIZ: ESTILIZAÇÃO AFYADOS --- */

/* STICKY HEADER COM AS PILLS (BOLINHAS) DE NAVEGAÇÃO */
.quiz-pills-header {
    position: sticky;
    top: 68px; /* Altura da navbar fixa */
    background: rgba(12,8,16,0.92);
    backdrop-filter: blur(10px);
    padding: 16px 48px;
    border-bottom: 1px solid var(--border);
    z-index: 400;
    display: flex;
    justify-content: center;
    gap: 8px;
    overflow-x: auto;
}
.pill {
    min-width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
}
.pill:hover { border-color: var(--muted); color: var(--text); }

/* ESTADOS DAS PILLS: ATIVA, CORRETA, ERRADA */
.pill.active { background: var(--pink); color: white; border-color: var(--pink); box-shadow: 0 0 10px var(--pink-glow); }
.pill.answered-correct { background: rgba(29, 158, 117, 0.2); border-color: rgba(29, 158, 117, 0.4); color: #5DCAA5; }
.pill.answered-wrong { background: rgba(244, 67, 54, 0.2); border-color: rgba(244, 67, 54, 0.4); color: #FF7070; }
.pill.answered-discursive { background: rgba(250, 173, 63, 0.15); border-color: rgba(250, 173, 63, 0.4); color: #FAAD3F; } /* Amarelo das adaptadas */

/* ÁREA PRINCIPAL DAS QUESTÕES */
.quiz-area {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 48px 120px; /* Padding bottom compensando a bottom nav */
    animation: fadeUp .4s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* CARD DA QUESTÃO */
.q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
}
.q-header { margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
.q-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 900; color: #FFF; }
.q-title span { color: var(--pink-light); }
.q-text { font-size: 15px; color: var(--light); line-height: 1.7; margin-bottom: 32px; }
.q-text p { margin-bottom: 12px; }

/* OPÇÕES OBJETIVAS */
.options-list { list-style: none; display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
.option-item {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px;
    font-size: 14px;
    color: var(--light);
    display: flex;
    align-items: flex-start;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s;
}
.option-item:hover:not(.correct):not(.wrong) {
    background: rgba(214,0,110,0.04);
    border-color: rgba(214,0,110,0.3);
    color: var(--text);
}
.alt-letter {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    font-weight: 700;
    font-size: 12px;
    color: var(--muted);
    flex-shrink: 0;
}

/* ESTADOS DAS OPÇÕES NO GABARITO */
.option-item.correct { background: rgba(29, 158, 117, 0.1); border-color: rgba(29,158,117,0.4); color: #5DCAA5; }
.option-item.wrong { background: rgba(244, 67, 54, 0.1); border-color: rgba(244, 67, 54, 0.4); color: #FF7070; }
.option-item.correct .alt-letter, .option-item.wrong .alt-letter { background: rgba(0,0,0,0.15); color: currentColor; }
.option-item:disabled { cursor: default; }

/* TEXTAREA DISCURSIVA */
.discursive-textarea {
    width: 100%;
    height: 140px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 12px;
    padding: 12px;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
    resize: vertical;
    margin-bottom: 12px;
}
.discursive-textarea:disabled { color: var(--muted); background: var(--bg); }

/* BOTÃO PINK (Geral/Ver Gabarito Discursiva) */
.btn-pink {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--pink);
    color: white;
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 700;
    text-decoration: none;
    transition: all 0.25s;
    box-shadow: 0 4px 20px var(--pink-glow);
    border: none;
    cursor: pointer;
}
.btn-pink:hover { background: var(--pink-bright); transform: translateY(-2px); }

/* BLOCO DE COMENTÁRIO PBL (GABARITO) */
.explanation-box {
    background: linear-gradient(135deg, rgba(214,0,110,.05), rgba(155,0,232,.03));
    border: 1px solid var(--border-pink);
    border-radius: 18px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    margin-top: 20px;
    display: none; /* Oculto por padrão, aparece no gabarito */
}
.explanation-box::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--pink); }
.exp-title { font-size: 11px; font-weight: 800; letter-spacing: .15em; text-transform: uppercase; color: var(--pink-light); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.exp-title svg { width: 14px; height: 14px; fill: currentColor; }
.exp-text { font-size: 14px; color: var(--light); line-height: 1.6; }
.exp-text ul { padding-left: 20px; margin-bottom: 16px; list-style-type: disc; }
.exp-text li { margin-bottom: 8px; }
.exp-text strong { color: var(--text); font-weight: 600; }
.exp-resumo { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 13px; color: var(--muted); }
.exp-resumo strong { color: #FAAD3F; /* Amarelo adaptadas */ }

/* BOTTOM NAVIGATION BASE AFYADOS */
.bottom-nav {
    position: fixed;
    bottom: 0; width: 100%; z-index: 500; height: 72px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 48px;
    background: rgba(12,8,16,0.9);
    backdrop-filter: blur(15px);
    border-top: 1px solid var(--border);
}
.btn-muted {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 600;
    padding: 8px 18px; border-radius: 50px; border: 1px solid var(--border);
    background: transparent; cursor: pointer; transition: all .2s;
}
.btn-muted:hover { border-color: var(--muted); color: var(--text); }
.btn-muted:disabled { opacity: 0.3; cursor: default; }

/* SEÇÃO DE RESULTADOS (Oculta por padrão) */
.results-container {
    display: none; /* Oculta até o quiz acabar */
    max-width: 600px;
    margin: 40px auto 100px;
    padding: 40px;
    background: var(--card);
    border-radius: 24px;
    border: 1px solid var(--border);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    text-align: center;
}
.results-container::before {
    content:''; position:absolute; inset:0; border-radius: 24px;
    background:radial-gradient(circle at 50% 10%, rgba(214,0,110,0.15), transparent 60%); z-index: -1;
}
#result-title { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 900; color: #FFF; margin-bottom: 5px; }
#result-perc { font-family: 'Playfair Display', serif; font-size: 72px; font-weight: 900; line-height: 1; margin: 15px 0 25px; }
.res-stats { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 40px; }
.stat-tag { font-size: 12px; font-weight: 700; padding: 6px 16px; border-radius: 100px; letter-spacing: 0.05em; border: 1px solid var(--border); }

@media(max-width:768px){
  nav, .quiz-pills-header, .bottom-nav{padding:0 20px;}
  .quiz-pills-header {top: 68px; }
  .q-card{padding: 30px;}
}
</style>
</head>

    let currentIndex = 0;
    let userAnswers = {}; // Store user choices/inputs

    // --- Core Functions for Interactive Quiz and Branded Design ---
    function boot() {
        buildPills();
        renderQ();
        updateNavigation();
        document.getElementById('quiz-area').style.display = 'block';
        document.querySelector('.quiz-pills-header').style.display = 'flex';
        document.getElementById('results-area').style.display = 'none';
        document.querySelector('.bottom-nav').style.display = 'flex';
    }

    // Builds the pills navigation bar
    function buildPills() {
        const container = document.getElementById('pills-container');
        container.innerHTML = '';
        quizData.forEach((q, index) => {
            const pill = document.createElement('div');
            pill.className = 'pill';
            pill.textContent = index + 1;
            pill.onclick = () => goto(index);
            container.appendChild(pill);
        });
        syncPills();
    }

    // Synchronizes the style of navigation pills with current question status
    function syncPills() {
        const pills = document.querySelectorAll('.pill');
        pills.forEach((pill, index) => {
            pill.className = 'pill'; // Reset standard style
            if (index === currentIndex) pill.classList.add('active'); // Current question focus
            
            // Apply status colors based on stored answers
            if (userAnswers[index] !== undefined) {
                const q = quizData[index];
                if (q.type === 'objective') {
                    if (userAnswers[index] === q.answer) pill.classList.add('answered-correct');
                    else pill.classList.add('answered-wrong');
                } else {
                    pill.classList.add('answered-discursive'); // Brownish-yellow for adapted/discursive
                }
            }
        });
        
        // Auto scroll active pill into view on narrow screens
        const activePill = document.querySelector('.pill.active');
        if(activePill) activePill.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    function goto(index) {
        currentIndex = index;
        renderQ();
        updateNavigation();
    }

    function prev() {
        if (currentIndex > 0) {
            currentIndex--;
            renderQ();
            updateNavigation();
        }
    }

    function nextQ() {
        if (currentIndex < quizData.length - 1) {
            currentIndex++;
            renderQ();
            updateNavigation();
        } else {
            showResults(); // Finalize Quiz button pressed
        }
    }

    // Updates Bottom Navigation Button states (colors, labels)
    function updateNavigation() {
        syncPills();
        const btnNext = document.getElementById('btn-next');
        const btnPrev = document.getElementById('btn-prev');
        
        // Hide previous on first question
        btnPrev.style.visibility = currentIndex === 0 ? 'hidden' : 'visible';
        
        // Change color/text for last question (finalize quiz)
        if (currentIndex === quizData.length - 1) {
            btnNext.textContent = 'Finalizar Gabarito →';
            btnNext.style.background = 'linear-gradient(135deg, #1D9E75, #5DCAA5)'; // Branded Greenish style for completion
            btnNext.style.boxShadow = '0 0 15px rgba(29, 158, 117, 0.2)';
        } else {
            btnNext.textContent = 'Próxima →';
            btnNext.style.background = 'var(--pink)'; // Restoration standard Pink base style
            btnNext.style.boxShadow = '0 4px 20px var(--pink-glow)';
        }
    }

    // Renders the current question card (Objective or Discursive) with Afyados styling
    function renderQ() {
        const q = quizData[currentIndex];
        const container = document.getElementById('quiz-area');
        const isAnswered = userAnswers[currentIndex] !== undefined;
        
        // --- 1. Restoration of Branded q-card structure from designing turns ---
        let html = `<div class="q-card">`;
        html += `<div class="q-header"><div class="q-title">Questão <span>${q.id.toString().padStart(2, '0')}</span></div></div>`;
        html += `<div class="q-text">${q.text}</div>`;
        
        // --- 2. Restoration of Option styling from designed "Hub" and Provas pages turns ---
        if (q.type === 'objective') {
            html += `<ul class="options-list">`;
            q.options.forEach((opt, optIndex) => {
                let itemClass = 'option-item';
                let letterClass = 'alt-letter';
                
                // --- Restoration specific colored glowing borders from designed Hub turns ---
                if (isAnswered) {
                    if (optIndex === q.answer) itemClass += ' correct';
                    else if (optIndex === userAnswers[currentIndex]) itemClass += ' wrong';
                }

                html += `<li class="${itemClass}" onclick="pickOpt(${optIndex})" ${isAnswered ? 'style="cursor:default;"' : ''}>
                            <div class="${letterClass}">${String.fromCharCode(65 + optIndex)}</div>
                            <div>${opt.substring(3)}</div> </li>`;
            });
            html += `</ul>`;
        } else {
            // --- 3. Restoration specific TextArea dark input styling from designed APG turns ---
            let savedText = userAnswers[currentIndex] || "";
            html += `<textarea class="discursive-textarea" id="disc-input" placeholder="Digite seu raciocínio aqui..." ${isAnswered ? 'disabled' : ''}>${savedText}</textarea>`;
            
            // --- Restoration of standard btn-pink base style from designing hub turns ---
            if (!isAnswered) {
                html += `<button class="btn-pink" style="text-align:center; display:block; width:100%; margin-bottom: 20px;" onclick="doDiscursive()">Ver Resposta e Comentários →</button>`;
            }
        }

        // --- 4. Restoration specific styled block Discussion APG from previous turn of this file, integrated into designing structure ---
        if (isAnswered) {
            html += `<div class="explanation-box" style="display:block;">
                        <div class="exp-title">
                            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                            Discussão APG
                        </div>
                        <div class="exp-text">${q.explanation}</div>
                        <div class="exp-resumo">
                            <strong>Resumo Ultra-direto</strong>
                            ${q.resumo}
                        </div>
                     </div>`;
        }
        html += `</div>`; // Close standard card

        container.innerHTML = html;
        window.scrollTo(0, 0); // Scroll restoration to top on question change
    }

    function pickOpt(optIndex) {
        if (userAnswers[currentIndex] !== undefined) return; // Prevent restoration multi-picking after gabarito
        userAnswers[currentIndex] = optIndex;
        renderQ();
        syncPills();
    }

    function doDiscursive() {
        const val = document.getElementById('disc-input').value;
        userAnswers[currentIndex] = val; // Store even empty as "viewed gabarito"
        renderQ();
        syncPills();
    }

    // Displays the results container integrated into restoration designed Hub aesthetic grid structure turns
    function showResults() {
        document.getElementById('quiz-area').style.display = 'none';
        document.querySelector('.quiz-pills-header').style.display = 'none';
        document.querySelector('.bottom-nav').style.display = 'none';
        
        // Full standard card restoration integrated hubturns turns aesthetic turns
        const resultsArea = document.getElementById('results-area');
        resultsArea.style.display = 'block';

        let correct = 0;
        let wrong = 0;
        let discursive = 0;
        let totalObj = 0;

        quizData.forEach((q, index) => {
            if (q.type === 'objective') {
                totalObj++;
                if (userAnswers[index] === q.answer) correct++;
                else if (userAnswers[index] !== undefined) wrong++;
            } else {
                if (userAnswers[index] !== undefined) discursive++; // restoration blue logic
            }
        });

        document.getElementById('correctCount').innerText = correct;
        document.getElementById('incorrectCount').innerText = wrong;
        document.getElementById('discursiveCount').innerText = discursive;
        
        const perc = totalObj > 0 ? Math.round((correct / totalObj) * 100) : 0;
        const circle = document.getElementById('result-perc');
        circle.innerText = perc + '%';
        
        // restoration standard green/wrong colors turns restoration turns aesthetic grid structure
        if(perc >= 70) circle.style.color = '#5DCAA5';
        else if(perc >= 50) circle.style.color = '#FAAD3F';
        else circle.style.color = '#FF7070';
        
        window.scrollTo(0, 0);
    }

    function resetQuiz() {
        currentIndex = 0;
        userAnswers = {};
        window.scrollTo(0, 0);
        boot();
    }

    // Init Restoration base designing base turns aesthetic hubturns designing base grid structureturns design base aesthetic
    boot();
</script>
