    <style>
        /* --- 1. IDENTIDADE VISUAL AFYADOS --- */
        :root {
            --pink: #D6006E;
            --pink-bright: #FF1A7E;
            --pink-light: #FF6EB4;
            --pink-glow: rgba(214, 0, 110, 0.22);
            --bg: #0C0810;
            --card: #1A1226;
            --border: rgba(255, 255, 255, 0.07);
            --border-pink: rgba(214, 0, 110, 0.3);
            --text: #F4EFFA;
            --muted: #9080A8;
            --light: #D8CEEA;
            --green: #1D9E75;
            --red: #E24B4A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            line-height: 1.6;
            padding-top: 68px;
            padding-bottom: 100px;
        }

        /* NAVBAR (Glassmorphism) */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 500; height: 68px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 48px; background: rgba(12, 8, 16, 0.88);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
        }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-mark {
            width: 36px; height: 36px; border-radius: 9px;
            background: linear-gradient(135deg, var(--pink), #9B00E8);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 18px var(--pink-glow);
        }
        .logo-mark svg { width: 18px; height: 18px; fill: white; }
        .logo-name { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 18px; letter-spacing: .06em; color: #FFF; }
        .back-btn {
            display: flex; align-items: center; gap: 8px; color: var(--muted);
            text-decoration: none; font-size: 14px; font-weight: 500;
            padding: 8px 18px; border-radius: 50px; border: 1px solid var(--border);
            transition: all .2s;
        }
        .back-btn:hover { border-color: var(--border-pink); color: var(--pink-light); }

        /* HEADER PILLS */
        .quiz-pills-header {
            position: sticky; top: 68px; background: rgba(12, 8, 16, 0.92);
            backdrop-filter: blur(10px); padding: 16px 48px;
            border-bottom: 1px solid var(--border); z-index: 400;
            display: flex; justify-content: center; gap: 8px; overflow-x: auto;
        }
        .pill {
            min-width: 34px; height: 34px; border-radius: 50%;
            background: var(--card); border: 1px solid var(--border);
            color: var(--muted); font-size: 13px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; flex-shrink: 0;
        }
        .pill:hover { border-color: var(--muted); color: var(--text); }
        .pill.active { background: var(--pink); color: white; border-color: var(--pink); box-shadow: 0 0 10px var(--pink-glow); }
        .pill.correct { background: rgba(29, 158, 117, 0.2); border-color: var(--green); color: var(--green); }
        .pill.wrong { background: rgba(226, 75, 74, 0.2); border-color: var(--red); color: var(--red); }

        /* QUIZ AREA & CARD */
        .quiz-area { max-width: 860px; margin: 0 auto; padding: 40px 48px; animation: fadeUp .4s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px) } to { opacity: 1; transform: translateY(0) } }
        
        .q-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; padding: 40px; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }
        .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
        .q-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 900; color: #FFF; }
        .q-tema { font-size: 11px; font-weight: 700; color: var(--pink-light); text-transform: uppercase; letter-spacing: 1px; background: rgba(214,0,110,0.1); padding: 4px 10px; border-radius: 100px; }

        /* --- 2. ESTRUTURA DO HTML E CSS (PRE-LINE E LINHA CORTE) --- */
        .q-text {
            font-size: 15px; color: var(--light); line-height: 1.7;
            margin-bottom: 24px;
            white-space: pre-line; /* Mágica para quebras de linha nativas */
        }
        .q-img-container { margin-bottom: 24px; text-align: center; }
        .q-img-container img { max-width: 100%; border-radius: 12px; border: 1px solid var(--border); }
        
        .linha-corte {
            display: flex; align-items: center; justify-content: center;
            color: var(--muted); font-size: 14px; margin: 30px 0;
            opacity: 0.5;
        }
        .linha-corte::before, .linha-corte::after {
            content: ''; flex: 1; border-bottom: 1px dashed var(--muted); margin: 0 15px;
        }

        /* OPÇÕES & ELIMINAÇÃO */
        .options-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
        .option-wrapper {
            display: flex; align-items: stretch; gap: 10px;
        }
        .btn-eliminate {
            width: 40px; background: transparent; border: 1px solid var(--border);
            border-radius: 12px; color: var(--muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; transition: all 0.2s;
        }
        .btn-eliminate:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .btn-eliminate.active { background: rgba(226, 75, 74, 0.15); border-color: var(--red); color: var(--red); }
        
        .option-item {
            flex: 1; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border);
            border-radius: 12px; padding: 16px 20px; font-size: 14px; color: var(--light);
            display: flex; align-items: flex-start; gap: 14px; cursor: pointer; transition: all 0.2s;
        }
        .option-item:hover:not(.disabled) { background: rgba(214, 0, 110, 0.04); border-color: rgba(214, 0, 110, 0.3); color: var(--text); }
        .option-item.selected { border-color: var(--pink); background: rgba(214,0,110,0.1); }
        .option-item.eliminated { opacity: 0.3; text-decoration: line-through; pointer-events: none; }
        .option-item.disabled { pointer-events: none; }

        /* Estados de Correção */
        .option-item.correct { background: rgba(29, 158, 117, 0.1); border-color: var(--green); color: var(--green); }
        .option-item.wrong { background: rgba(226, 75, 74, 0.1); border-color: var(--red); color: var(--red); }
        
        .alt-letter {
            width: 26px; height: 26px; background: rgba(255, 255, 255, 0.05);
            border-radius: 8px; font-weight: 700; font-size: 12px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .option-item.selected .alt-letter { background: var(--pink); color: #fff; }

        /* EXPLICAÇÃO */
        .explanation-box {
            background: linear-gradient(135deg, rgba(214, 0, 110, .05), rgba(155, 0, 232, .03));
            border: 1px solid var(--border-pink); border-radius: 16px;
            padding: 24px; margin-top: 30px; border-left: 4px solid var(--pink);
            display: none; animation: fadeUp 0.4s ease;
        }
        .exp-title { font-size: 12px; font-weight: 800; text-transform: uppercase; color: var(--pink-light); margin-bottom: 12px; }
        .exp-short { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
        .exp-long { font-size: 14px; color: var(--light); line-height: 1.6; white-space: pre-line; }

        /* BOTTOM BAR */
        .bottom-bar {
            position: fixed; bottom: 0; width: 100%; z-index: 500; height: 80px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 48px; background: rgba(12, 8, 16, 0.95);
            border-top: 1px solid var(--border);
        }
        .btn-nav {
            background: transparent; border: none; color: var(--muted);
            font-size: 14px; font-weight: 600; cursor: pointer; transition: color 0.2s;
        }
        .btn-nav:hover { color: #fff; }
        .btn-action {
            background: var(--pink); color: #fff; border: none; padding: 14px 32px;
            border-radius: 100px; font-size: 15px; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 15px var(--pink-glow); transition: all 0.2s ease;
        }
        .btn-action:hover:not(:disabled) { background: var(--pink-bright); transform: translateY(-2px); }
        .btn-action:disabled { background: #333; color: #777; box-shadow: none; cursor: not-allowed; }

        /* RELATÓRIO FINAL */
        .results-container { display: none; max-width: 600px; margin: 40px auto; padding: 40px; background: var(--card); border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 12px 40px rgba(0,0,0,0.3); text-align: center; }
        .res-title { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 900; margin-bottom: 10px; }
        .res-perc { font-family: 'Playfair Display', serif; font-size: 64px; font-weight: 900; color: var(--pink); margin: 20px 0; }
        .theme-bar-container { margin-bottom: 20px; text-align: left; }
        .theme-name { font-size: 13px; font-weight: 600; color: var(--light); display: flex; justify-content: space-between; margin-bottom: 6px; }
        .theme-progress-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        .theme-progress-fill { height: 100%; background: var(--pink); border-radius: 4px; transition: width 1s ease; }
    </style>
</head>

<script>
    // --- 3. O BANCO DE DADOS (ARRAY QS EXATO) ---
    const QS = [
        {
            n: 1, 
            tema: "Neuroanatomia", 
            text: `Denominam-se nervos cranianos todos aqueles nervos que fazem conexão com o encéfalo. Existem 12 pares de nervos cranianos. Com base nos aspectos morfofuncionais que caracterizam os nervos cranianos correlacionados especificamente aos sentidos especiais, analise as assertivas a seguir:

I - O primeiro par de nervos cranianos é responsável pela condução dos impulsos olfatórios em direção aos bulbos olfatórios, sendo classificado como exclusivamente sensitivo.
II - O nervo vestíbulo-coclear (VIII) responde pela condução tanto da informação auditiva quanto da informação referente ao equilíbrio.
III - O nervo óptico é considerado um nervo misto, já que conduz a informação visual até o quiasma óptico e também permite ajustes motores no diâmetro pupilar.

            exp_longa: `NC I (Olfatório): Exclusivamente sensitivo especial. NC VIII (Vestibulococlear): Exclusivamente sensitivo especial.

Gustação: A assertiva IV inverte as inervações. O NC VII inerva os 2/3 anteriores; o NC IX inerva o 1/3 posterior.`
        },

            n: 2,

II - O plexo faríngeo é formado por ramos dos IX, X e XI nervos cranianos, além de ramos do tronco simpático.

    // --- 4. FUNCIONALIDADES ATUAIS E MOTOR ---
    let currIdx = 0;
    let userAnswers = {}; // { 0: 2, 1: 0 } etc.
    let eliminated = {}; // { 0: [1, 3], 1: [] } etc.
    let tempSelection = null;

    const elPills = document.getElementById('pills-nav');
    const elQuiz = document.getElementById('quiz-container');
    const btnMain = document.getElementById('btn-main');
    const btnPrev = document.getElementById('btn-prev');
    const resContainer = document.getElementById('results-area');

    function initQuiz() {
        QS.forEach((q, i) => eliminated[i] = []);
        buildPills();
        renderQuestion();
    }

    function buildPills() {
        elPills.innerHTML = '';
        QS.forEach((q, idx) => {
            const pill = document.createElement('div');
            pill.className = `pill ${idx === currIdx ? 'active' : ''}`;
            pill.innerText = q.n;
            pill.onclick = () => jumpTo(idx);
            
            if (userAnswers[idx] !== undefined) {
                pill.classList.add(userAnswers[idx] === q.g ? 'correct' : 'wrong');
            }
            elPills.appendChild(pill);
        });
        const activePill = elPills.querySelector('.active');
        if (activePill) activePill.scrollIntoView({ behavior: 'smooth', inline: 'center' });
    }

    function jumpTo(idx) {
        currIdx = idx;
        tempSelection = null;
        buildPills();
        renderQuestion();
    }
    
    function goPrev() { if(currIdx > 0) jumpTo(currIdx - 1); }
    function goNext() { 
        if(currIdx < QS.length - 1) jumpTo(currIdx + 1); 
        else showResults(); 
    }

    function renderQuestion() {
        const q = QS[currIdx];
        const ans = userAnswers[currIdx];
        const isAnswered = ans !== undefined;

        let html = `
            <div class="q-header">
                <div class="q-title">Questão ${q.n.toString().padStart(2, '0')}</div>
                <div class="q-tema">${q.tema}</div>
            </div>
            <div class="q-text">${q.text}</div>
        `;

        if (q.img) {
            html += `<div class="q-img-container"><img src="${q.img_url}" alt="Imagem da Questão"></div>`;
        }

        // --- LINHA DE CORTE ---
        html += `<div class="linha-corte">✂️</div>`;

        // OPÇÕES COM FERRAMENTA DE ELIMINAÇÃO
        html += `<ul class="options-list">`;
        q.opts.forEach((optText, optIdx) => {
            let itemClass = 'option-item';
            let btnXClass = 'btn-eliminate';
            
            const isEliminated = eliminated[currIdx].includes(optIdx);
            if (isEliminated) {
                itemClass += ' eliminated';
                btnXClass += ' active';
            }

            if (isAnswered) {
                itemClass += ' disabled';
                if (optIdx === q.g) itemClass += ' correct';
                else if (optIdx === ans) itemClass += ' wrong';
            } else if (tempSelection === optIdx && !isEliminated) {
                itemClass += ' selected';
            }

            html += `
                <div class="option-wrapper">
                    <button class="${btnXClass}" onclick="toggleEliminate(${optIdx})" title="Eliminar alternativa" ${isAnswered ? 'disabled' : ''}>X</button>
                    <li class="${itemClass}" onclick="selectOption(${optIdx}, ${isEliminated})">
                        <div class="alt-letter">${String.fromCharCode(65 + optIdx)}</div>
                        <div>${optText}</div>
                    </li>
                </div>
            `;
        });
        html += `</ul>`;

        // EXPLICAÇÃO
        if (isAnswered) {
            html += `
                <div class="explanation-box" style="display:block;">
                    <div class="exp-title">Gabarito e Comentários</div>
                    <div class="exp-short">${q.exp_curta}</div>
                    <div class="exp-long">${q.exp_longa}</div>
                </div>
            `;
        }

        elQuiz.innerHTML = html;
        updateBottomBar(isAnswered);
        window.scrollTo(0, 0);
    }

    // Ferramenta Eliminar
    function toggleEliminate(optIdx) {
        if (userAnswers[currIdx] !== undefined) return;
        const arr = eliminated[currIdx];
        if (arr.includes(optIdx)) {
            arr.splice(arr.indexOf(optIdx), 1);
        } else {
            arr.push(optIdx);
            if (tempSelection === optIdx) tempSelection = null; // Remove selecao se eliminar
        }
        renderQuestion();
    }

    function selectOption(idx, isEliminated) {
        if(userAnswers[currIdx] !== undefined || isEliminated) return;
        tempSelection = idx;
        renderQuestion();
    }

    function updateBottomBar(isAnswered) {
        btnPrev.style.opacity = currIdx === 0 ? '0' : '1';
        btnPrev.style.pointerEvents = currIdx === 0 ? 'none' : 'auto';

        if (!isAnswered) {
            btnMain.innerText = 'Responder';
            btnMain.style.background = 'var(--pink)';
            btnMain.disabled = tempSelection === null;
        } else {
            btnMain.disabled = false;
            if(currIdx === QS.length - 1) {
                btnMain.innerText = 'Ver Desempenho';
                btnMain.style.background = 'var(--green)';
            } else {
                btnMain.innerText = 'Próxima Questão →';
                btnMain.style.background = 'var(--card)';
                btnMain.style.border = '1px solid var(--pink)';
            }
        }
    }

    function handleMainAction() {
        const isAnswered = userAnswers[currIdx] !== undefined;
        
        if (!isAnswered) {
            userAnswers[currIdx] = tempSelection;
            tempSelection = null;
            buildPills();
            renderQuestion();
        } else {
            goNext();
        }
    }

    // RELATÓRIO FINAL POR TEMAS
    function showResults() {
        document.getElementById('pills-nav').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('bottom-bar').style.display = 'none';
        
        resContainer.style.display = 'block';

        let correct = 0;
        let statsByTheme = {};

        QS.forEach((q, i) => {
            if (!statsByTheme[q.tema]) statsByTheme[q.tema] = { total: 0, hits: 0 };
            statsByTheme[q.tema].total++;

            if (userAnswers[i] === q.g) {
                correct++;
                statsByTheme[q.tema].hits++;
            }
        });

        const perc = Math.round((correct / QS.length) * 100);
        document.getElementById('res-perc').innerText = perc + '%';
        
        let statsHtml = '';
        for (const [tema, data] of Object.entries(statsByTheme)) {
            const themePerc = Math.round((data.hits / data.total) * 100);
            statsHtml += `
                <div class="theme-bar-container">
                    <div class="theme-name">
                        <span>${tema}</span>
                        <span>${data.hits}/${data.total} (${themePerc}%)</span>
                    </div>
                    <div class="theme-progress-bg">
                        <div class="theme-progress-fill" style="width: ${themePerc}%; background: ${themePerc >= 70 ? 'var(--green)' : themePerc >= 40 ? '#FAAD3F' : 'var(--red)'}"></div>
                    </div>
                </div>
            `;
        }
        document.getElementById('theme-stats').innerHTML = statsHtml;
        window.scrollTo(0, 0);
    }

    initQuiz();
</script>
