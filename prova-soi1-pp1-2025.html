<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}
.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}.sticky-inner{max-width:820px;margin:0 auto;}.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}.qp:hover{border-color:var(--green-b);color:#5DCAA5;}.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}
.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}.q-header-left{display:flex;align-items:center;gap:8px;}.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}.q-tag-sep{color:rgba(255,255,255,0.12);}.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}.q-assertions{font-size:15px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;}.q-img{max-width:100%;border-radius:10px;margin:12px 0;display:block;}.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-opts{display:flex;flex-direction:column;gap:9px;}.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}.q-opt[disabled]{cursor:default;}.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{background:none;border:none;cursor:pointer;padding:0;margin-left:auto;flex-shrink:0;opacity:0.4;color:var(--muted);transition:opacity .15s;}.opt-elim-btn:hover{opacity:1;}
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}.q-feedback.show{display:block;animation:fadeUp .25s ease;}.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}.fb-short{display:block;margin-bottom:14px;line-height:1.8;white-space:pre-line;}
.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-aprofundar:hover,.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}.ai-box.open{display:block;animation:fadeUp .3s ease;}.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}
.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}.btn-prev[disabled]{opacity:0.3;cursor:default;}.q-counter{font-size:14px;color:var(--muted);}.q-counter strong{color:#F4EFFA;font-weight:700;}.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}

.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}.btn-retry:hover{background:var(--pink-bright);}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}.report-section{margin-bottom:24px;}.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}.tema-name{font-size:13px;color:var(--light);min-width:200px;flex-shrink:0;}.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}.tema-pct.green{color:#5DCAA5;}.tema-pct.red{color:#F09595;}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.q-review-list{display:flex;flex-direction:column;gap:6px;}.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}.q-rev-row:hover{background:rgba(255,255,255,0.05);}.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}.dot-err{background:#E24B4A;}.q-rev-row span{flex:1;font-size:13px;color:var(--light);}.q-rev-row small{font-size:12px;color:var(--muted);}
.hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;}.hl-active .q-body{cursor:crosshair;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){nav,.sticky-bar{padding-left:16px;padding-right:16px;}.main{padding:150px 14px 60px;}.q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}.q-feedback,.ai-box{margin-left:16px;margin-right:16px;}.q-text{font-size:15px;}.q-opt{font-size:14px;padding:12px 14px;}.insight-grid{grid-template-columns:1fr;}.tema-name{min-width:120px;font-size:12px;}}
</style>
</head>

const QS=[
{n:1,tema:'Membrana Plasmática — Estrutura e Função',context:'A membrana plasmática é uma estrutura essencial nas células eucarióticas, não apenas delimitando a célula, mas também participando ativamente na organização de diversas organelas, como núcleo, complexo de Golgi, retículos endoplasmáticos, mitocôndrias, lisossomos e peroxissomos. Além disso, desempenha um papel crucial no controle da entrada e saída de substâncias.\n\nConsiderando a importância fisiológica da membrana plasmática e suas características estruturais, analise as afirmações a seguir e assinale a afirmativa correta:',assertions:null,text:null,opts:['A membrana plasmática possui proteínas integrais ou intrínsecas que são importantes para a propagação do potencial de ação em células como neurônios e células musculares estriadas esqueléticas e cardíacas.','A bomba de sódio-potássio compõe uma proteína transportadora importante nas células animais, pois mantém maior concentração de K+ na face externa da membrana e alta concentração de Na+ na face interna da membrana.','A membrana plasmática é uma bicamada lipídica formada por uma dupla lâmina de colesterol onde estão incrustadas proteínas periféricas ou extrínsecas transportadoras que facilitam o transporte por difusão facilitada.','Algumas células apresentam especializações de membrana como as células musculares cardíacas que apresentam os discos intercalares, constituídos de proteínas que dificultam a comunicação celular e atrasam a despolarização.'],g:0,exp:'A) Esta afirmativa é correta, pois as proteínas integrais, especialmente os canais iônicos, são essenciais para a despolarização e repolarização das membranas celulares em neurônios e músculos, facilitando a propagação do impulso nervoso e a contração muscular.\n\nB) Incorreta: A bomba de sódio-potássio efetivamente transporta sódio para fora da célula e potássio para dentro, criando um gradiente de concentração. Portanto, a concentração de potássio é maior dentro da célula e a de sódio maior fora.\n\nC) Incorreta: A membrana plasmática é de fato uma bicamada lipídica, mas a estrutura não é uma “dupla lâmina de colesterol”. O colesterol é uma parte da bicamada, mas a difusão facilitada é mediada por proteínas integrais (não periféricas) que atuam como canais ou transportadores.\n\nD) Incorreta: Os discos intercalares não dificultam a comunicação celular; pelo contrário, eles facilitam a comunicação intercelular pela transmissão de sinais elétricos, que são essenciais para a contração sincronizada do músculo cardíaco.',deep:'🧠 MEMBRANA PLASMÁTICA — ESTRUTURA E PROTEÍNAS\n\nBicamada lipídica:\n→ Formada por fosfolipídios (cabeça hidrofílica + cauda hidrofóbica)\n→ Colesterol intercalado → fluidez e estabilidade\n→ NÃO é "dupla lâmina de colesterol"\n\nProteínas integrais (intrínsecas):\n→ Atravessam a bicamada\n→ Canais iônicos (Na+, K+, Ca2+)\n→ Essenciais para potencial de ação\n→ Transportadores (difusão facilitada)\n\nProteínas periféricas (extrínsecas):\n→ Não atravessam a membrana\n→ Funções estruturais e de sinalização\n\nBomba Na+/K+-ATPase:\n→ 3 Na+ para FORA + 2 K+ para DENTRO\n→ Na+ maior fora, K+ maior dentro\n→ Mantém potencial de repouso\n\nDiscos intercalares (músculo cardíaco):\n→ Desmossomos (adesão mecânica)\n→ Gap junctions (comunicação elétrica)\n→ FACILITAM despolarização sincronizada\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ B: Na+ maior FORA, K+ maior DENTRO (ao contrário do enunciado)\n❌ C: Difusão facilitada é por proteínas INTEGRAIS, não periféricas\n❌ D: Discos intercalares FACILITAM (gap junctions), não dificultam\n\n💡 MACETE\nBomba Na/K: "3 Na sai, 2 K entra" → Na fora, K dentro'},
{n:2,tema:'Embriologia Cardíaca — Formação do Coração',context:'A formação do coração tem início na 3ª semana do desenvolvimento, a partir de espessamentos celulares no mesoderma cardiogênico, que originam os cordões angioblásticos. Esses cordões canalizam e formam os tubos endocárdicos, que se fundem e dão origem ao tubo cardíaco primitivo. O coração primitivo passa por dobramentos e alongamentos que possibilitam a formação de suas regiões e tecidos característicos.\n\nCom base nessas informações, avalie as afirmações a seguir:',assertions:'I. O tubo endocárdico dará origem ao revestimento endotelial interno do coração, denominado endocárdio.\nII. O mesoderma esplâncnico dá origem ao miocárdio, tecido muscular da parede cardíaca, e também à geleia cardíaca.\nIII. O dobramento cefalocaudal do embrião é o único responsável pela fusão dos tubos endocárdicos, sem participação do dobramento lateral.\nIV. O coração primitivo já apresenta septação atrioventricular e interventricular completa ao final da 3ª semana de desenvolvimento.',text:'É correto o que se afirma em:',opts:['I e II, apenas.','I, II e III, apenas.','II e IV, apenas.','III e IV, apenas.'],g:0,exp:'I. Correta → O tubo endocárdico forma o endocárdio.\n\nII. Correta → O mesoderma esplâncnico forma o miocárdio e a geleia cardíaca.\n\nIII. Errada → A fusão dos tubos endocárdicos depende do dobramento lateral do embrião, não apenas do cefalocaudal.\n\nIV. Errada → Ao final da 3ª semana o coração ainda é tubular; a septação ocorre da 4ª à 7ª semana.',deep:'❤️ EMBRIOLOGIA CARDÍACA — CRONOLOGIA\n\n3ª semana:\n→ Espessamentos no mesoderma cardiogênico → cordões angioblásticos\n→ Canalização → tubos endocárdicos pareados\n→ Fusão lateral → tubo cardíaco único (DOBRAMENTO LATERAL → essencial)\n→ Coração começa a bater (~22° dia)\n\nTecidos originados:\n→ Tubo endocárdico → ENDOCÁRDIO (revestimento interno)\n→ Mesoderma esplâncnico → MIOCÁRDIO + geleia cardíaca\n→ Mesoderma somático (pericárdio visceral) → EPICÁRDIO\n\n4ª–7ª semana:\n→ Dobramento e torcionamento do tubo\n→ Formação das câmaras\n→ SEPTAÇÃO atrioventricular e interventricular\n→ Formação das valvas\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ III: Dobramento LATERAL é o responsável pela fusão dos tubos (não cefalocaudal)\n❌ IV: 3ª semana = coração tubular; septação ocorre na 4ª–7ª semana\n\n💡 MACETE\nFusão dos tubos = dobramento LATERAL\nSeptação = 4ª–7ª semana (depois do tubo)'},
{n:3,tema:'Potenciais de Ação Cardíacos — Resposta Rápida vs Lenta',context:'Na prática clínica, compreender as características dos potenciais de ação cardíacos é fundamental para avaliar a função elétrica do coração. Considerando os potenciais de ação cardíacos de resposta rápida (miócitos atriais, ventriculares e fibras de Purkinje) e de resposta lenta (células do nó sinoatrial e atrioventricular), assinale a alternativa correta quanto ao mecanismo predominante da fase 0 (upstroke = movimento ou traço ascendente) e sua velocidade de despolarização:',assertions:null,text:null,opts:['Nos potenciais de ação de resposta rápida, a fase 0 é mediada principalmente pelo influxo de cálcio via canais tipo L, enquanto nos de resposta lenta decorre do influxo rápido de sódio, resultando em upstroke mais íngreme.','Nos potenciais de ação de resposta lenta, a fase 0 apresenta menor inclinação por depender do influxo de cálcio através dos canais tipo L; já nos de resposta rápida, a fase 0 é íngreme devido ao influxo rápido de sódio por canais de sódio voltagem-dependentes.','Em ambos os tipos celulares, a fase 0 é determinada pela saída de potássio por canais retificadores, o que explica a despolarização inicial com velocidades semelhantes.','A diferença principal entre potenciais de ação de resposta rápida e lenta ocorre apenas na fase de repolarização, uma vez que a fase 0 é semelhante em todos os tecidos e depende predominantemente de sódio.'],g:1,exp:'Nos potenciais de ação de resposta rápida (miócitos atriais, ventriculares e Purkinje), a fase 0 apresenta um upstroke íngreme, devido ao influxo rápido de Na+ pelos canais rápidos de sódio voltagem-dependentes. Já nos potenciais de ação de resposta lenta (células do nó SA e AV), a fase 0 é menos inclinada, pois depende da entrada mais lenta de Ca2+ através dos canais tipo L, uma vez que esses tecidos não utilizam canais rápidos de sódio para a despolarização inicial.\n\nAlternativa A: Nos potenciais de ação de resposta rápida, a fase 0 é mediada principalmente pelo influxo rápido de sódio (Na+) através de canais de sódio voltagem-dependentes, enquanto que nos de resposta lenta, a fase 0 é mediada pelo influxo de cálcio (Ca2+) via canais tipo L. Portanto, a afirmativa confunde os mecanismos.\n\nAlternativa C: A fase 0 não é mediada pela saída de potássio; na verdade, a despolarização inicial ocorre devido ao influxo de sódio nas células de resposta rápida e pelo influxo de cálcio nas de resposta lenta. A saída de potássio ocorre nas fases de repolarização.\n\nAlternativa D: A diferença fundamental entre os potenciais de ação de resposta rápida e lenta não se limita à fase de repolarização; a fase 0 também é distinta, uma vez que depende do influxo rápido de sódio nas células de resposta rápida e do influxo de cálcio nas células de resposta lenta.',deep:'⚡ POTENCIAIS DE AÇÃO CARDÍACOS — FASE 0\n\nResposta RÁPIDA (miócitos atriais, ventriculares, Purkinje):\n→ Fase 0 = influxo rápido de Na+ (canais INa)\n→ Upstroke MUITO íngreme (+200 mV/s)\n→ Despolarização rápida = condução rápida\n\nResposta LENTA (nó SA, nó AV):\n→ Fase 0 = influxo lento de Ca2+ (canais tipo L)\n→ Upstroke pouco inclinado (~10 mV/s)\n→ Despolarização lenta = condução lenta\n\nK+ (potássio) na fase 0? NAO!\n→ K+ SAI nas fases 3 (repolarização)\n→ Fase 0 = SEMPRE entrada de íon positivo (Na+ ou Ca2+)\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ A: Inverte os mecanismos\n❌ C: K+ nao causa despolarizacao; ele SAI na repolarizacao\n❌ D: Fase 0 E diferente entre os dois tipos\n\n💡 MACETE\nRapido = Na rapido = ingreme\nLento = Ca lento = gradual\nK sempre SAI (repolariza)'},
{n:4,tema:'Bulhas Cardíacas — Características',context:'Durante a ausculta cardíaca de um paciente saudável o médico percebe a sequência rítmica "tum-tá. tum-tá". O "tum" corresponde ao fechamento das valvas atrioventriculares e o "tá" ao fechamento das valvas semilunares. Além da diferença na origem anatômica e no momento do ciclo cardíaco, esses sons apresentam variações de duração e frequência que ajudam na sua identificação clínica.\n\nConsiderando essas características, assinale a alternativa correta:',assertions:null,text:null,opts:['A primeira bulha cardíaca (B1) é mais curta que a segunda bulha (B2) devido à maior tensão das valvas atrioventriculares em relação às valvas semilunares.','Tanto a primeira quanto a segunda bulha cardíaca possuem duração média de 0,14 segundo, pois a vibração das valvas ocorre por igual tempo.','A segunda bulha cardíaca (B2) apresenta frequência mais alta do que a primeira bulha (B1) devido ao maior tensionamento das valvas semilunares e à maior elasticidade das paredes arteriais.','A primeira bulha cardíaca (B1) resulta principalmente do fechamento das valvas semilunares e da reverberação do sangue nas artérias.'],g:2,exp:'A segunda bulha (B2) tem frequência mais alta devido a dois fatores principais: o maior grau de tensionamento das valvas semilunares e a maior elasticidade das paredes arteriais, que funcionam como câmaras vibratórias mais eficientes.\n\nA) Incorreta. A primeira bulha é mais longa (~0,14 s) que a segunda (~0,11 s) porque as valvas AV vibram por mais tempo, sendo menos tensas que as semilunares.\n\nB) Incorreta. As durações são diferentes: B1 ~ 0,14 s e B2 ~ 0,11 s.\n\nD) Incorreta. A primeira bulha está associada ao fechamento das valvas atrioventriculares (mitral e tricúspide) e não das semilunares.',deep:'🎵 BULHAS CARDÍACAS — B1 vs B2\n\nB1 ("tum"):\n→ Fechamento valvas ATRIOVENTRICULARES (mitral + tricuspide)\n→ Inicio da sistole ventricular\n→ Duracao: ~0,14 s (MAIS LONGA)\n→ Frequencia: mais baixa\n\nB2 ("ta"):\n→ Fechamento valvas SEMILUNARES (aortica + pulmonar)\n→ Inicio da diastole ventricular\n→ Duracao: ~0,11 s (MAIS CURTA)\n→ Frequencia: mais alta (valvas mais tensas + paredes arteriais elasticas)\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ A: B1 e MAIS LONGA (0,14 s), nao mais curta\n❌ B: Duracoes sao DIFERENTES (B1 > B2)\n❌ D: B1 = fechamento das AV, nao das semilunares\n\n💡 MACETE\nTUM (B1) = atriovenTRIcular = mais longa\nTA (B2) = semilunar = mais curta, mais aguda'},
{n:5,tema:'Órgãos Linfáticos — Primários e Secundários',context:'Durante uma aula de anatomia, o professor discutiu os órgãos que compõem o sistema linfático e suas principais funções. Em seguida, solicitou aos alunos que identificassem corretamente um órgão linfático primário responsável pela maturação de linfócitos T.\n\nCom base nesse contexto, assinale a alternativa correta:',assertions:null,text:null,opts:['Baço — órgão linfático primário, responsável pela maturação dos linfócitos B e T.','Linfonodos — órgãos linfáticos primários que filtram a linfa e promovem a maturação de linfócitos T.','Tonsilas palatinas — órgãos linfáticos primários que atuam na maturação de linfócitos B na infância.','Timo — órgão linfático primário, localizado no mediastino, responsável pela maturação dos linfócitos T.'],g:3,exp:'O timo é um órgão linfático primário, localizado no mediastino anterior, responsável pela maturação dos linfócitos T. Embora esteja mais ativo na infância e involua na idade adulta, continua sendo essencial para o desenvolvimento da imunidade adaptativa.\n\na) O baço é um órgão linfático secundário, cuja função principal é a filtração do sangue, remoção de eritrócitos envelhecidos e resposta imune a antígenos sanguíneos. Não está envolvido na maturação inicial dos linfócitos T ou B.\n\nb) Os linfonodos são órgãos linfáticos secundários, atuando como filtros da linfa e locais de ativação e proliferação de linfócitos, mas não de maturação. A maturação dos linfócitos ocorre nos órgãos primários: timo (linfócitos T) e medula óssea (linfócitos B).\n\nc) As tonsilas palatinas fazem parte do anel de Waldeyer e são órgãos linfáticos secundários. Participam da resposta imune local na cavidade oral e faringe, mas não estão envolvidas na maturação de linfócitos. Além disso, linfócitos B amadurecem na medula óssea, e não nas tonsilas.',deep:'🛡 ORGAOS LINFATICOS — PRIMARIOS vs SECUNDARIOS\n\nORGAOS PRIMARIOS (maturacao):\n→ Timo → maturacao dos LINFOCITOS T\n   Localizacao: mediastino anterior\n   Mais ativo na infancia; involui com a idade\n→ Medula ossea → maturacao dos LINFOCITOS B\n\nORGAOS SECUNDARIOS (ativacao e resposta):\n→ Linfonodos: filtram LINFA + ativam linfocitos\n→ Baco: filtra SANGUE + remove eritrocitos velhos\n→ Tonsilas (anel de Waldeyer): resposta imune local\n→ Placas de Peyer: no ileo\n→ MALT: tecido linfoide associado a mucosas\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ A: Baco e SECUNDARIO\n❌ B: Linfonodos sao SECUNDARIOS; ativam, nao maturam\n❌ C: Tonsilas sao SECUNDARIAS; linfocito B matura na medula ossea\n\n💡 MACETE\nTimo = T de T (matura linfocito T)\nMedula ossea = B de Bone marrow (matura linfocito B)'},
{n:6,tema:'Hematopoiese — Células Sanguíneas',context:'A hematopoiese é a síntese de células sanguíneas. No adulto esse processo ocorre na medula óssea vermelha a partir de progenitores mieloides e linfoides, originando células ou fragmentos celulares com estruturas e funções diversas, como transporte de oxigênio, coagulação e defesa imunológica.\n\nObserve as células produzidas abaixo e analise as afirmativas:',assertions:'[[IMG_Q6]]\n\nI. O item A representa uma célula dendrítica, de origem mieloide ou linfoide, cuja função é a apresentação de antígenos.\nII. Em C, visualiza-se um eosinófilo, granulócito de origem mieloide, associado a reações alérgicas e parasitoses.\nIII. Células de origem mieloide são mostradas em B e C.\nIV. No item B, têm-se os linfócitos. Estes são semelhantes ao microscópio, sendo difíceis distingui-los, porém apresentam funções e especificidades distintas, como produção de anticorpos (linfócito T) e indução de apoptose (células Natural Killer).',text:'É correto no que se afirma:',opts:['Apenas II está correta.','II e IV estão corretas.','I e III estão corretas.','II e III estão corretas.'],g:2,exp:'I e II: CORRETAS.\n\nIII: INCORRETA. B representa os linfócitos de origem linfoide, enquanto C, o eosinófilo, de origem mieloide. Portanto, apenas C é de origem mieloide (não B e C).\n\nIV: INCORRETA. Os linfócitos B produzem anticorpos, enquanto os linfócitos T CD8+ induzem apoptose em células tumorais ou infectadas por vírus, pela liberação de gramzima e perforina. As células NK também apresentam origem linfoide e mecanismo de ação similar aos linfócitos T CD8+.',deep:'🔬 HEMATOPOIESE — LINHAGENS\n\nLinhagem MIELOIDE:\n→ Eritrocitos (hemacias)\n→ Plaquetas\n→ Granulocitoitos: neutrofilos, eosinofilos, basofilos\n→ Monocitos/macrofagos\n→ Celulas dendriticas (maioria)\n\nLinhagem LINFOIDE:\n→ Linfocitos B (produzem anticorpos)\n→ Linfocitos T CD4+ (auxiliares)\n→ Linfocitos T CD8+ (citotoxicos → apoptose)\n→ Celulas NK (natural killer → origem linfoide)\n\nSobre as imagens:\n→ A: Celula dendritica (projecoes citoplasmaticas) → MIELOIDE\n→ B: Linfocito (nucleo redondo, escuro) → LINFOIDE\n→ C: Eosinofilo (granulos rosa/laranja, bilobado) → MIELOIDE\n\nIV incorreta: anticorpos = linfocito B (nao T)\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ B: IV esta incorreta (confunde B com T)\n❌ D: III esta incorreta (B e linfoide, nao mieloide)\n\n💡 MACETE\nB = Bone marrow = anticorpos\nT = Timo = citotoxicidade\nEosinofilo = rosa = parasitas + alergias'},
{n:7,tema:'Anatomia do Coração — Câmaras e Valvas',context:'O coração é um órgão muscular oco, localizado no mediastino médio, cuja função é bombear o sangue por meio de contrações rítmicas e coordenadas. Sua anatomia é dividida em quatro câmaras (dois átrios e dois ventrículos) separados por válvulas que controlam o fluxo sanguíneo unidirecional. A compreensão da organização interna e externa do coração é essencial para correlacionar anatomia com a prática clínica, especialmente em situações de insuficiência cardíaca, doenças valvares e distúrbios do sistema de condução.\n\n[[IMG_Q7]]\n\nCom base na anatomia do coração, assinale a alternativa correta:',assertions:null,text:null,opts:['O átrio direito recebe sangue venoso das veias cavas superior e inferior e do seio coronário, enquanto o átrio esquerdo recebe sangue arterial das veias pulmonares.','O ventrículo direito possui parede mais espessa que o ventrículo esquerdo, pois é responsável por bombear sangue para a circulação sistêmica.','As válvulas atrioventriculares são constituídas pela válvula tricúspíde à esquerda e pela válvula mitral à direita.','O sulco coronário localiza-se na face posterior do coração e contém apenas a artéria coronária direita.'],g:0,exp:'De acordo com Moore (2024), o átrio direito recebe sangue venoso proveniente da circulação sistêmica pelas veias cavas superior e inferior e ainda do seio coronário. O átrio esquerdo, por sua vez, recebe sangue arterial oxigenado através das quatro veias pulmonares.\n\n(b) incorreta: o ventrículo esquerdo tem parede mais espessa, pois bombeia sangue sob alta pressão para a circulação sistêmica; o direito bombeia apenas para os pulmões.\n\n(c) incorreta: a válvula tricúspide está no lado direito (átrio direito → ventrículo direito), e a válvula mitral (bicúspide) no lado esquerdo (átrio esquerdo → ventrículo esquerdo).\n\n(d) incorreta: o sulco coronário separa átrios de ventrículos, circunda a base do coração e contém ramos tanto da artéria coronária direita quanto da esquerda.',deep:'❤ ANATOMIA CARDIACA — CAMARAS, VALVAS E SULCOS\n\nCAMARAS E CONEXOES:\n→ Atrio DIREITO: recebe veias cavas (sup + inf) + seio coronario\n   Sangue VENOSO (desoxigenado)\n→ Atrio ESQUERDO: recebe 4 veias pulmonares\n   Sangue ARTERIAL (oxigenado)\n→ Ventriculo DIREITO: bombeia para pulmoes\n   Parede MAIS FINA\n→ Ventriculo ESQUERDO: bombeia para corpo\n   Parede MAIS ESPESSA (3x mais grossa)\n\nVALVAS:\n→ Atrioventriculares:\n   Tricuspide (3 cuspides) → DIREITA (AD→VD)\n   Mitral/Bicuspide (2 cuspides) → ESQUERDA (AE→VE)\n→ Semilunares:\n   Aortica → VE | Pulmonar → VD\n\nSULCOS:\n→ Sulco coronario: separa atrios de ventriculos\n   Contem: A. coronaria DIREITA + ramo circunflexo\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ B: VE e mais espesso (nao VD)\n❌ C: Tricuspide = DIREITA; Mitral = ESQUERDA (ao contrario)\n❌ D: Sulco coronario nao e so posterior e contem AMBAS as arterias\n\n💡 MACETE\nTRIcuspide = TRIgono direito = DIREITA\nMITral = MITAD esquerda = ESQUERDA\nVE = mais trabalho = parede mais espessa'},
{n:8,tema:'Vascularização dos Membros Superiores — Pressão Arterial',context:'Durante uma aula prática, os alunos do primeiro período de Medicina realizam a aferição da pressão arterial com esfigmomanômetro e estetescópio. O professor solicita que os alunos justifiquem anatomicamente o local ideal para posicionar o estetescópio durante esse procedimento, com base nos vasos dos membros superiores. Os alunos ouvem os sons de Korotkoff que são produzidos pelo fluxo arterial turbulento do sangue através de uma artéria parcialmente ocluída.\n\nCom base nisso, assinale a alternativa correta:',assertions:null,text:null,opts:['O estetescópio deve ser posicionado sobre a artéria radial, pois ela é a continuação direta da artéria braquial e se localiza mais superficialmente na axila.','O estetescópio deve ser posicionado sobre a artéria braquial, localizada na fossa cubital, medialmente ao tendão do músculo bíceps braquial.','O estetescópio deve ser posicionado sobre a artéria ulnar, que se localiza superficialmente na região anterior do antebraço e é mais próxima da clavícula.','O estetescópio deve ser posicionado sobre a artéria axilar, pois ela é mais calibrosa e facilita a detecção dos sons de Korotkoff.'],g:1,exp:'A artéria braquial é o vaso sobre o qual o estetescópio deve ser posicionado durante a aferição da pressão arterial. Ela passa pela fossa cubital, região anterior do cotovelo, medial ao tendão do bíceps braquial, e é suficientemente superficial para que os sons de Korotkoff sejam auscultados com clareza.\n\nAlternativa A) Incorreta. A artéria radial é superficial e utilizada na palpação do pulso radial, não na ausculta para aferição da pressão. Ela se localiza no punho, não na axila. Além disso, a artéria braquial não continua diretamente para a axila — quem se encontra nessa região é a artéria axilar, que se torna a braquial à medida que desce pelo braço.\n\nAlternativa C) Incorreta. A artéria ulnar é menos acessível para a aferição da pressão arterial, pois é mais profunda e menos palpável na maioria dos pacientes. Além disso, ela não está "mais próxima da clavícula".\n\nAlternativa D) Incorreta. A artéria axilar é de maior calibre, mas está localizada profundamente na região da axila e não é o local padrão para posicionamento do estetescópio.',deep:'💪 VASCULARIZACAO DO MEMBRO SUPERIOR\n\nTopografia (proximal → distal):\nAorta → A. Subclavial → A. AXILAR → A. BRAQUIAL → A. Radial + A. Ulnar\n\nA. AXILAR:\n→ Da clavicula a margem inferior do peitoral menor\n→ PROFUNDA na axila\n→ Nao usada para aferica de PA\n\nA. BRAQUIAL:\n→ Continuacao da axilar\n→ Fossa cubital: SUPERFICIAL, medial ao tendao do biceps\n→ LOCAL PADRAO para ausculta de PA\n\nA. RADIAL:\n→ Ramo da braquial (na fossa cubital)\n→ Superficial no punho → pulso radial\n\nA. ULNAR:\n→ Ramo da braquial\n→ Mais profunda, menos palpavel\n\nSons de Korotkoff:\n→ Fase I: 1o som = pressao sistolica\n→ Fase V: desaparecimento = pressao diastolica\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ A: Radial e no PUNHO; axilar e que esta na axila\n❌ C: Ulnar e mais profunda\n❌ D: Axilar e profunda; dificulta ausculta\n\n💡 MACETE\nPA = Braquial (fossa cubital)\nPulso = Radial (punho)'}
];
let cur=0,sel=null,answered={},eliminated={};
function buildPills(){const w=document.getElementById('qPills');w.innerHTML='';for(let i=0;i<QS.length;i++){const b=document.createElement('button');b.className='qp';b.id='qp'+i;b.textContent=i+1;b.onclick=(function(idx){return function(){goTo(idx);};})(i);w.appendChild(b);}}
function syncPills(){for(let i=0;i<QS.length;i++){const p=document.getElementById('qp'+i);if(!p)continue;p.className='qp';if(i===cur)p.classList.add('current');if(answered[i]!==undefined){p.classList.add(answered[i]===QS[i].g?'correct':'wrong');}}}
function imgReplace(s){if(!s)return s;return s.replace(/\[\[IMG_Q6\]\]/g,'<img class="q-img" src="'+IMG_Q6+'" alt="">').replace(/\[\[IMG_Q7\]\]/g,'<img class="q-img" src="'+IMG_Q7+'" alt="">');}
function renderQ(){const q=QS[cur];sel=(answered[cur]!==undefined)?answered[cur]:null;const done=answered[cur]!==undefined;document.getElementById('qTagNum').textContent='Questão '+q.n;document.getElementById('qTagTema').textContent=q.tema;document.getElementById('qCounterNum').textContent=q.n;
const ctx=document.getElementById('qContext');if(q.context){ctx.style.display='block';ctx.innerHTML=imgReplace(q.context).replace(/\n/g,'<br>');}else{ctx.style.display='none';}
const asr=document.getElementById('qAssertions');if(q.assertions){asr.style.display='block';asr.innerHTML=imgReplace(q.assertions).replace(/\n/g,'<br>');}else{asr.style.display='none';}
const qt=document.getElementById('qText');if(q.text){qt.style.display='block';qt.innerHTML=imgReplace(q.text).replace(/\n/g,'<br>');}else{qt.style.display='none';}
const wrap=document.getElementById('qOpts');wrap.innerHTML='';q.opts.forEach(function(o,i){const btn=document.createElement('button');btn.className='q-opt';if(done){btn.setAttribute('disabled','');if(i===q.g)btn.classList.add('correct');else if(i===sel&&i!==q.g)btn.classList.add('wrong');}else if(sel===i){btn.classList.add('selected');}const isElim=!done&&eliminated[cur]&&eliminated[cur].has(i);if(isElim)btn.classList.add('eliminated');btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span class="opt-text">'+o+'</span><button class="opt-elim-btn" title="Eliminar alternativa"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';if(!done){(function(idx){btn.onclick=function(e){if(e.target.closest('.opt-elim-btn'))return;selectOpt(idx);};btn.querySelector('.opt-elim-btn').onclick=function(e){e.stopPropagation();if(!eliminated[cur])eliminated[cur]=new Set();if(eliminated[cur].has(idx)){eliminated[cur].delete(idx);btn.classList.remove('eliminated');}else{eliminated[cur].add(idx);btn.classList.add('eliminated');if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}}};})(i);}else{btn.querySelector('.opt-elim-btn').style.display='none';}wrap.appendChild(btn);});
const fb=document.getElementById('qFeedback');const aiBox=document.getElementById('aiBox');if(done){const ok=sel===q.g;const fbClass=ok?'fb-ok':'fb-err';const fbLabel=ok?'✓ Correto!':'✗ Incorreto — Gabarito: '+L[q.g].toUpperCase();fb.className='q-feedback show '+fbClass;fb.innerHTML='<span class="fb-label">'+fbLabel+'</span><span class="fb-short">'+q.exp+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">✦ Aprofundar com IA</button>';aiBox.classList.remove('open');document.getElementById('aiContent').textContent='';}else{fb.className='q-feedback';fb.innerHTML='';aiBox.style.display='none';aiBox.classList.remove('open');}
document.getElementById('btnPrev').disabled=(cur===0);const btnN=document.getElementById('btnNext');if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}else{btnN.innerHTML='Próxima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}
const btnR=document.getElementById('btnRespond');if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(sel===null);}syncPills();}
function toggleAI(qIdx){const aiBox=document.getElementById('aiBox');const btnAI=document.getElementById('btnAI');if(aiBox.classList.contains('open')){aiBox.classList.remove('open');if(btnAI)btnAI.classList.remove('active');}else{document.getElementById('aiContent').textContent=QS[qIdx].deep;aiBox.style.display='block';aiBox.classList.add('open');if(btnAI)btnAI.classList.add('active');}}
function selectOpt(i){if(answered[cur]!==undefined)return;sel=i;document.getElementById('btnRespond').disabled=false;document.querySelectorAll('.q-opt').forEach(function(o,idx){if(!o.classList.contains('eliminated')){o.className='q-opt'+(idx===i?' selected':'');}(function(ii){o.onclick=function(e){if(!e.target.closest('.opt-elim-btn'))selectOpt(ii);};})(idx);});}
function submitAnswer(){if(answered[cur]!==undefined)return;if(sel===null)return;answered[cur]=sel;renderQ();}
function prevQ(){if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
function nextQ(){if(cur===QS.length-1){showResult();return;}cur++;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function goTo(i){cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function showResult(){document.getElementById('qCard').style.display='none';const rs=document.getElementById('resultScreen');rs.classList.add('show');const correct=QS.filter(function(q,i){return answered[i]===q.g;}).length;const total=QS.length;const pct=Math.round((correct/total)*100);const ring=document.getElementById('resRing');ring.textContent=pct+'%';ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');document.getElementById('resTitle').textContent=pct>=70?'Parabéns!':pct>=50?'Quase lá!':'Continue praticando!';document.getElementById('resSub').textContent='Você acertou '+correct+' de '+total+' questões ('+pct+'%)';document.getElementById('resOk').textContent=correct;document.getElementById('resErr').textContent=total-correct;document.getElementById('resSkip').textContent=total-Object.keys(answered).length;buildReport(correct,total);rs.scrollIntoView({behavior:'smooth',block:'start'});}
function buildReport(correct,total){const temaStats={};QS.forEach(function(q,i){if(!temaStats[q.tema])temaStats[q.tema]={total:0,correct:0,wrong:0};const t=temaStats[q.tema];t.total++;if(answered[i]===undefined){}else if(answered[i]===q.g){t.correct++;}else{t.wrong++;}});const sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});let barsHtml='';sorted.forEach(function(tema){const s=temaStats[tema];const pct=Math.round((s.correct/s.total)*100);const isGood=pct>=50;barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill '+(isGood?'green':'red')+'" style="width:'+pct+'%"></div></div><span class="tema-pct '+(isGood?'green':'red')+'">'+pct+'%</span></div>';});const worstTema=sorted.find(function(t){return temaStats[t].wrong>0;})||'—';const bestTema=sorted.slice().reverse().find(function(t){return temaStats[t].correct>0;})||'—';let wrongHtml='';QS.forEach(function(q,i){if(answered[i]!==undefined&&answered[i]!==q.g){wrongHtml+='<div class="q-rev-row" onclick="goTo('+i+')"><div class="rev-dot dot-err"></div><span>Q'+q.n+' — '+q.tema+'</span><small>Resp: '+L[answered[i]].toUpperCase()+' · Gabarito: '+L[q.g].toUpperCase()+'</small></div>';}});if(!wrongHtml)wrongHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro registrado 🎉</div>';document.getElementById('reportContent').innerHTML='<div class="report-section"><h4>Desempenho por tema</h4><div>'+barsHtml+'</div></div><div class="report-section"><h4>Insights</h4><div class="insight-grid"><div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Maior incidência de erros</div></div><div class="insight-box"><div class="ib-label">Melhor desempenho</div><div class="ib-val">'+bestTema+'</div><div class="ib-sub">Maior taxa de acerto</div></div><div class="insight-box"><div class="ib-label">Aproveitamento</div><div class="ib-val">'+correct+'/'+total+'</div><div class="ib-sub">'+(pct>=70?'Ótimo domínio!':pct>=50?'Foque nos pontos fracos.':'Revise antes da prova.')+'</div></div><div class="insight-box"><div class="ib-label">Questões puladas</div><div class="ib-val">'+(total-Object.keys(answered).length)+'</div><div class="ib-sub">Sem resposta registrada</div></div></div></div><div class="report-section"><h4>Questões erradas</h4><div class="q-review-list">'+wrongHtml+'</div></div>';}
function resetAll(){answered={};sel=null;cur=0;eliminated={};document.getElementById('resultScreen').classList.remove('show');document.getElementById('qCard').style.display='block';renderQ();window.scrollTo({top:0,behavior:'smooth'});}
buildPills();renderQ();
var hlOn=false;function toggleHL(){hlOn=!hlOn;document.querySelectorAll('.hl-toggle').forEach(function(b){b.classList.toggle('active',hlOn);});document.body.classList.toggle('hl-active',hlOn);}document.addEventListener('mouseup',hlHandle);document.addEventListener('touchend',hlHandle);function hlHandle(e){if(!hlOn)return;var s=window.getSelection();if(!s||s.isCollapsed||!s.rangeCount)return;var r=s.getRangeAt(0);var p=r.commonAncestorContainer;if(p.nodeType===3)p=p.parentNode;var qb=p.closest?p.closest('.q-body'):null;if(!qb){var sc=r.startContainer;if(sc.nodeType===3)sc=sc.parentNode;qb=sc.closest?sc.closest('.q-body'):null;}if(!qb)return;if(e.target&&e.target.closest&&e.target.closest('mark.hl'))return;var t=s.toString().trim();if(!t||t.length<2)return;try{var m=document.createElement('mark');m.className='hl';m.title='Clique para remover';r.surroundContents(m);}catch(ex){try{var f=r.extractContents();var m2=document.createElement('mark');m2.className='hl';m2.title='Clique para remover';m2.appendChild(f);r.insertNode(m2);}catch(ex2){}}s.removeAllRanges();}document.addEventListener('click',function(e){if(!hlOn)return;var m=e.target.closest?e.target.closest('mark.hl'):null;if(!m)return;var p=m.parentNode;while(m.firstChild)p.insertBefore(m.firstChild,m);p.removeChild(m);p.normalize();});
</script>
<script>
const PROVA_ID='soi1-pp1-2025';const PERIODO=1;const CONTENT_TYPE='prova_programada';const STORAGE_KEY='afyados_prova_'+PROVA_ID;
function saveLocal(){const state={answered:answered,cur:cur,eliminated:{}};for(const k in eliminated)state.eliminated[k]=Array.from(eliminated[k]);localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function loadLocal(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return false;const state=JSON.parse(raw);if(state.answered&&Object.keys(state.answered).length>0){answered=state.answered;cur=state.cur||0;eliminated={};if(state.eliminated){for(const k in state.eliminated)eliminated[k]=new Set(state.eliminated[k]);}return true;}}catch(e){}return false;}
const _sbScript=document.createElement('script');_sbScript.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';_sbScript.onload=function(){window.sb=supabase.createClient('https://mmqfqlbojsbuuodfbilh.supabase.co','sb_publishable_fZp0two05vv3IPxqNnFL_w_agbTPZYH');};document.head.appendChild(_sbScript);
async function saveToSupabase(i){try{const{data:{user}}=await sb.auth.getUser();if(!user)return;const q=QS[i];const isCorrect=answered[i]===q.g;await sb.from('question_responses').upsert({user_id:user.id,question_id:PROVA_ID+'-q'+String(q.n).padStart(2,'0'),periodo:PERIODO,content_type:CONTENT_TYPE,user_answer:L[answered[i]],correct_answer:L[q.g],is_correct:isCorrect,time_spent_seconds:0,topic:q.tema,difficulty:'media'},{onConflict:'user_id,question_id'});const{data:row}=await sb.from('user_progress').select('*').eq('user_id',user.id).eq('periodo',PERIODO).single();if(row){const t=row.total_questions_solved+1;const c=row.correct_answers+(isCorrect?1:0);const topics=row.topics_studied||[];if(q.tema&&!topics.includes(q.tema))topics.push(q.tema);await sb.from('user_progress').update({total_questions_solved:t,correct_answers:c,accuracy_percentage:parseFloat(((c/t)*100).toFixed(1)),last_studied:new Date().toISOString(),topics_studied:topics}).eq('user_id',user.id).eq('periodo',PERIODO);}else{await sb.from('user_progress').insert({user_id:user.id,periodo:PERIODO,total_questions_solved:1,correct_answers:isCorrect?1:0,accuracy_percentage:isCorrect?100:0,last_studied:new Date().toISOString(),topics_studied:q.tema?[q.tema]:[]});}}catch(e){console.warn('Supabase:',e);}}
const _origSubmit=submitAnswer;submitAnswer=function(){const idx=cur;_origSubmit();saveLocal();if(answered[idx]!==undefined&&window.sb)saveToSupabase(idx);};
const _origReset=resetAll;resetAll=function(){localStorage.removeItem(STORAGE_KEY);_origReset();};
if(loadLocal()){renderQ();}
</script>
