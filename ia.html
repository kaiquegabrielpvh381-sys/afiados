<style>
:root{--pink:#D6006E;--pink-bright:#FF1A8E;--glow:rgba(214,0,110,0.3);--bg:#08050A;--card:#120B1A;--sidebar:#0D0814;--border:rgba(255,255,255,0.08);--text:#F4EFFA;--muted:#6e6080;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);display:flex;}

/* ── SIDEBAR ── */
.sidebar{width:260px;flex-shrink:0;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;z-index:100;}
.sb-top{padding:20px 15px;}
.logo-row{display:flex;align-items:center;gap:12px;text-decoration:none;color:white;margin-bottom:20px;}
.logo-icon{background:var(--pink);padding:6px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.new-btn{background:rgba(214,0,110,0.1);border:1px solid rgba(214,0,110,0.2);color:var(--text);padding:12px;border-radius:12px;cursor:pointer;width:100%;font-weight:600;transition:0.2s;}
.new-btn:hover{background:var(--pink);border-color:var(--pink);}
.hist-wrap{flex:1;overflow-y:auto;padding:15px;color:var(--muted);font-size:13px;}
.sb-bot{padding:15px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.sb-link{color:var(--muted);text-decoration:none;font-size:14px;padding:10px;border-radius:10px;display:flex;align-items:center;gap:10px;transition:0.2s;}
.sb-link:hover{background:rgba(255,255,255,0.05);color:white;}

/* ── MAIN CONTENT ── */
.main{flex:1;display:flex;flex-direction:column;background:radial-gradient(circle at top right, #1A0B26, transparent);}
.chat-flow{flex:1;overflow-y:auto;padding:40px 15%;display:flex;flex-direction:column;gap:25px;}
