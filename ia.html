<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA Afyados</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#D6006E;--pink-bright:#FF1A8E;--glow:rgba(214,0,110,0.3);--bg:#08050A;--card:#120B1A;--sidebar:#0D0814;--border:rgba(255,255,255,0.08);--text:#F4EFFA;--muted:#6e6080;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);display:flex;}

/* ── SIDEBAR ── */
.sidebar{width:260px;flex-shrink:0;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;transition:width .25s,transform .25s;z-index:100;}
.sidebar.collapsed{width:0;overflow:hidden;border-right:none;}
.sb-top{padding:14px 10px 10px;display:flex;flex-direction:column;gap:6px;}
.logo-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;text-decoration:none;}
.logo-row:hover{background:rgba(255,255,255,.05);}
.logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--pink),#8A00D4);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 12px var(--glow);}
.logo-icon img{width:17px;height:17px;object-fit:contain;}
.logo-name{font-size:15px;font-weight:700;color:var(--text);}
.logo-tag{font-size:10px;font-weight:600;color:var(--pink);background:rgba(214,0,110,.12);border:1px solid rgba(214,0,110,.25);padding:2px 7px;border-radius:100px;}
.new-btn{display:flex;align-items:center;gap:8px;background:rgba(214,0,110,.1);border:1px solid rgba(214,0,110,.2);color:var(--text);font-size:13px;padding:10px 12px;border-radius:10px;cursor:pointer;font-family:inherit;transition:all .2s;width:100%;font-weight:600;}
.new-btn:hover{background:rgba(214,0,110,.2);border-color:rgba(214,0,110,.4);}
.sb-div{height:1px;background:var(--border);margin:4px 8px;}
.hist-wrap{flex:1;overflow-y:auto;padding:4px 8px;}
.hist-wrap::-webkit-scrollbar{width:3px;}
.hist-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px;}
.hist-lbl{font-size:10px;font-weight:700;color:var(--muted);padding:10px 10px 6px;letter-spacing:.08em;text-transform:uppercase;}
.conv{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;cursor:pointer;transition:background .15s;}
.conv:hover{background:rgba(255,255,255,.05);}
.conv.active{background:rgba(214,0,110,.1);border:1px solid rgba(214,0,110,.15);}
.conv-title{font-size:13px;color:#c0b8d0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.conv.active .conv-title{color:var(--text);}
.conv-del{opacity:0;background:none;border:none;color:var(--muted);cursor:pointer;padding:2px 5px;border-radius:4px;font-size:12px;flex-shrink:0;transition:all .15s;}
.conv:hover .conv-del{opacity:1;}
.conv-del:hover{color:#ff6b6b;}
.no-hist{padding:16px 10px;font-size:13px;color:var(--muted);line-height:1.7;text-align:center;}
.sb-bot{padding:10px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:4px;}
.sb-link{display:flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-size:13px;padding:9px 12px;border-radius:9px;transition:all .15s;background:none;border:none;cursor:pointer;font-family:inherit;width:100%;text-align:left;}
.sb-link:hover{background:rgba(255,255,255,.05);color:var(--text);}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0;background:radial-gradient(circle at top right,#1A0B26,transparent);}

/* Topbar */
.topbar{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;border-bottom:1px solid var(--border);}
.sb-toggle{display:flex;background:none;border:none;color:var(--muted);padding:6px;border-radius:8px;cursor:pointer;}
.sb-toggle:hover{background:rgba(255,255,255,.06);color:var(--text);}
.topbar-title{font-size:14px;font-weight:600;color:#c0b8d0;}
.clear-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:500;padding:5px 12px;border-radius:8px;cursor:pointer;font-family:inherit;transition:all .2s;}
.clear-btn:hover{border-color:rgba(255,255,255,.2);color:var(--text);}

/* Chat flow */
.chat-flow{flex:1;overflow-y:auto;padding:36px 18% 140px;display:flex;flex-direction:column;gap:30px;scroll-behavior:smooth;align-items:center;}
.chat-flow::-webkit-scrollbar{width:4px;}
.chat-flow::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px;}

/* Welcome */
.welcome-msg{display:flex;gap:15px;animation:up .4s ease;width:100%;max-width:680px;}
.welcome-msg .avatar{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--pink),#8A00D4);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 0 20px var(--glow);}
.welcome-msg .content h3{color:var(--pink);font-size:19px;margin-bottom:8px;border-left:3px solid var(--pink);padding-left:12px;}
.welcome-msg .content p{color:#c0b8d0;font-size:15px;line-height:1.7;}

/* Suggestions */
.sug-wrap{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:560px;}
.sug{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .2s;}
.sug:hover{border-color:rgba(214,0,110,.35);background:rgba(214,0,110,.06);}
.sug-t{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;}
.sug-s{font-size:12px;color:var(--muted);line-height:1.4;}

/* Messages */
.msg{display:flex;gap:15px;animation:up .35s ease;width:100%;max-width:680px;}
.msg.user{flex-direction:row-reverse;}
.msg-av{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;margin-top:2px;}
.msg.bot .msg-av{background:linear-gradient(135deg,var(--pink),#8A00D4);box-shadow:0 0 12px var(--glow);}
.msg.user .msg-av{display:none;}
.msg-body{max-width:88%;min-width:0;}
.msg.user .msg-body{max-width:75%;}
.msg-name{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:.04em;}
.msg.user .msg-name{display:none;}
.msg-text{font-size:15.5px;line-height:1.85;color:#e8e0f5;}
.msg.user .msg-text{background:var(--pink);padding:13px 18px;border-radius:18px 18px 3px 18px;box-shadow:0 5px 20px var(--glow);color:white;display:inline-block;}

/* Markdown Styling */
.msg-text h1{font-size:21px;font-weight:800;margin:20px 0 10px;color:#fff;}
.msg-text h2{font-size:18px;font-weight:700;margin:18px 0 8px;color:#fff;}
.msg-text h3{font-size:16px;font-weight:700;margin:14px 0 7px;color:var(--pink);border-left:3px solid var(--pink);padding-left:11px;}
.msg-text h4{font-size:14px;font-weight:700;margin:12px 0 6px;color:#e0d8f0;}
.msg-text p{margin-bottom:12px;}
.msg-text strong{font-weight:700;color:#fff;}
.msg-text table{width:100%;border-collapse:collapse;margin:12px 0;font-size:14px;}
.msg-text th{background:rgba(214,0,110,.1);padding:9px 13px;text-align:left;border:1px solid rgba(214,0,110,.2);}
.msg-text td{padding:8px 13px;border:1px solid var(--border);}

/* Typing & Cursor */
.typing-dots{display:flex;gap:4px;padding:6px 0;align-items:center;}
.typing-dots span{width:7px;height:7px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite;}
.stream-cursor::after{content:"▋";animation:blink .7s infinite;color:var(--pink);font-size:14px;margin-left:2px;vertical-align:middle;}

/* Input Area */
.input-area{position:absolute;bottom:28px;left:18%;right:18%;background:rgba(18,11,26,0.92);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:12px 16px 12px 20px;display:flex;align-items:flex-end;gap:12px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.input-box{flex:1;background:transparent;border:none;color:var(--text);outline:none;font-size:15.5px;resize:none;max-height:130px;min-height:26px;line-height:1.6;}
.send-btn{background:var(--pink);border:none;width:40px;height:40px;border-radius:12px;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;}

@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

@media(max-width:900px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .sb-overlay.show{display:block;}
  .chat-flow{padding:28px 5% 140px;}
  .input-area{left:5%;right:5%;bottom:20px;}
}
</style>
</head>

      <div class="logo-icon">🤖</div>
      <span class="logo-name">Afyados IA</span>
    </div>
    <button
